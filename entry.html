<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>排班系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --bg: #eef1f5;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #4b89dc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 外框卡片 ── */
    .card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,.10);
      padding: 36px 28px 32px;
      width: min(360px, 92vw);
      text-align: center;
    }

    /* ── App header bar ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: 24px;
    }
    .app-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }
    .app-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: .04em;
    }

    /* ── 圖示圓圈 ── */
    .icon-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
    }
    .icon-circle.blue   { background: #dbeafe; }
    .icon-circle.yellow { background: #fef3c7; }
    .icon-circle.red    { background: #fee2e2; }
    .icon-circle.orange { background: #ffedd5; }

    /* ── 標題 / 說明 ── */
    .status-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .status-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* ── 分隔線 ── */
    .divider {
      width: 40px; height: 2px;
      background: #f3f4f6;
      border-radius: 2px;
      margin: 18px auto;
    }

    /* ── 狀態 Badge ── */
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 20px;
    }
    .badge.blue   { background: #dbeafe; color: #1d4ed8; }
    .badge.yellow { background: #fef3c7; color: #92400e; }
    .badge.red    { background: #fee2e2; color: #991b1b; }
    .badge.orange { background: #ffedd5; color: #9a3412; }

    /* ── Loading 文字列 ── */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 13px;
      color: var(--primary);
      font-weight: 700;
    }
    .spinner-sm {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #bcd3f5;
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 預設隱藏所有狀態區塊 ── */
    .state { display: none; }
    .state.active { display: block; }
  </style>
</head>
<body>
  <div class="card">

    <!-- App Header（共用） -->
    <div class="app-header">
      <div class="app-dot"></div>
      <span class="app-name">排班系統・桃園營運處</span>
    </div>

    <!-- ① Loading -->
    <div class="state active" id="state-loading">
      <div class="icon-circle blue">📅</div>
      <div class="status-title" style="color:#1d4ed8">驗證身分中</div>
      <div class="status-desc">正在確認你的帳號權限，請稍候...</div>
      <div class="status-row">
        <div class="spinner-sm"></div>
        連線中
      </div>
    </div>

    <!-- ② 審核中 / 尚未開通 -->
    <div class="state" id="state-pending">
      <div class="icon-circle yellow">⏳</div>
      <div class="status-title">申請審核中</div>
      <div class="status-desc" id="msg-pending">你的申請已送出，<br/>請等待管理員開通後再試。</div>
      <div class="divider"></div>
      <span class="badge yellow">等待審核</span>
    </div>

    <!-- ③ 帳號停用 -->
    <div class="state" id="state-blocked">
      <div class="icon-circle red">🚫</div>
      <div class="status-title" style="color:#991b1b">帳號已停用</div>
      <div class="status-desc">你的帳號存取已被限制，<br/>請聯絡管理員處理。</div>
      <div class="divider"></div>
      <span class="badge red">無法存取</span>
    </div>

    <!-- ④ 系統/設定異常 -->
    <div class="state" id="state-error">
      <div class="icon-circle orange">⚠️</div>
      <div class="status-title" style="color:#92400e">系統異常</div>
      <div class="status-desc" id="msg-error">身分別設定有問題，<br/>請聯絡管理員確認。</div>
      <div class="divider"></div>
      <span class="badge orange">請聯絡管理員</span>
    </div>

    <!-- ⑤ 無查詢權限（canQuery = false，與帳號停用視覺區隔） -->
    <div class="state" id="state-no-query">
      <div class="icon-circle orange">🔒</div>
      <div class="status-title" style="color:#9a3412">目前無法使用</div>
      <div class="status-desc" id="msg-no-query">目前尚無查詢或排班權限，<br/>請稍後再試。</div>
      <div class="divider"></div>
      <span class="badge orange">權限未開放</span>
    </div>

  </div>

  <script>
    const LIFF_ID = '2009174277-Dwu3ebuB';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw5nLu4db1KvJkOl1j98srOVCsR8AgZh3TByl1SrQDAZgn0LROV6CHdhA5PwwVd6miA/exec';
    const PT_URL  = 'https://mars83830-glitch.github.io/pt.html';
    const FT_URL  = 'https://mars83830-glitch.github.io/ft.html';

    function showState(id) {
      document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }

    function buildRedirectUrl(baseUrl, userId, displayName, data) {
      const p = new URLSearchParams();
      p.set('uid', userId || '');
      p.set('displayName', displayName || '');
      p.set('role', data.role || '');
      p.set('status', data.status || '');
      p.set('isSP', String(!!data.isSP));
      p.set('canQuery', String(!!data.canQuery));
      p.set('canEdit', String(!!data.canEdit));
      p.set('month', data.targetMonth || data.defaultMonth || '');
      p.set('targetMonth', data.targetMonth || data.defaultMonth || '');
      p.set('defaultMonth', data.defaultMonth || data.targetMonth || '');
      p.set('hasSubmitted', String(!!data.hasSubmitted));
      p.set('selectableMonths', JSON.stringify(Array.isArray(data.selectableMonths) ? data.selectableMonths : []));
      p.set('fromEntry', '1');
      return `${baseUrl}?${p.toString()}`;
    }

    async function init() {
      showState('state-loading');
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile     = await liff.getProfile();
        const userId      = profile.userId      || '';
        const displayName = profile.displayName || '';

        const url = `${GAS_URL}?action=checkPermission`
          + `&uid=${encodeURIComponent(userId)}`
          + `&displayName=${encodeURIComponent(displayName)}`;

        const res  = await fetch(url);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById('msg-error').textContent =
            '系統錯誤，請稍後再試。\n\n' + (data.message || '');
          showState('state-error');
          return;
        }

        switch (data.status) {

          case 'not_found':
            document.getElementById('msg-pending').innerHTML =
              '你的帳號尚未開通，申請已自動送出，<br/>請等待管理員開通後再試。';
            showState('state-pending');
            break;

          case 'pending':
            document.getElementById('msg-pending').innerHTML =
              '你的申請正在審核中，<br/>請等待管理員開通後再試。';
            showState('state-pending');
            break;

          case 'blocked':
            showState('state-blocked');
            break;

          case 'invalid_role':
            document.getElementById('msg-error').innerHTML =
              '身分別設定有問題，<br/>請聯絡管理員確認你的身分別設定。';
            showState('state-error');
            break;

          case 'active':
            if (!data.canQuery) {
              document.getElementById('msg-no-query').innerHTML =
                (data.message || '目前尚無查詢或排班權限，<br/>請稍後再試。');
              showState('state-no-query');
              return;
            }
            if (data.role === 'PT') {
              window.location.href = buildRedirectUrl(PT_URL, userId, displayName, data);
              return;
            }
            if (data.role === 'FT') {
              window.location.href = buildRedirectUrl(FT_URL, userId, displayName, data);
              return;
            }
            document.getElementById('msg-error').textContent = '身分別異常，請聯絡管理員。';
            showState('state-error');
            break;

          default:
            document.getElementById('msg-error').textContent = '發生未知錯誤，請重新開啟後再試。';
            showState('state-error');
        }

      } catch (err) {
        document.getElementById('msg-error').innerHTML =
          '登入或驗證失敗，<br/>請重新開啟後再試。<br/><br/>' + (err.message || err);
        showState('state-error');
      }
    }

    window.onload = init;
  </script>
</body>
</html>

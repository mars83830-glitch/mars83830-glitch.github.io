<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <title>桃園營運處｜作業回報</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#eef1f5;color:#1f2937;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif}
    .wrap{max-width:520px;margin:0 auto;padding:16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.05);margin-top:14px}
    h1,h2,h3{margin:0 0 10px}
    h2{font-size:22px}
    h3{font-size:18px}
    .hint{font-size:13px;color:#6b7280;line-height:1.6}
    .row{margin:4px 0}
    label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:#374151}
    label .req{color:#dc2626;margin-left:4px}
    input,select,button,textarea{font-size:15px;padding:11px 12px;border:1px solid #9ca3af;border-radius:10px;width:100%;background:#fff;color:#111827;font-family:inherit;font-weight:700}
    input::placeholder,textarea::placeholder{color:#9ca3af;opacity:1;font-weight:400}
    input::-webkit-input-placeholder,textarea::-webkit-input-placeholder{color:#9ca3af;font-weight:400}
    input::-moz-placeholder,textarea::-moz-placeholder{color:#9ca3af;opacity:1;font-weight:400}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    button{cursor:pointer;font-weight:700}
    .btnMain{background:#2563eb;color:#fff;border:0;padding:14px}
    .btnMain:disabled{background:#9ca3af;cursor:not-allowed}
    .btnSecondary{background:#fff;color:#374151;border:1px solid #d1d5db}
    .taskGrid{display:grid;grid-template-columns:1fr;gap:12px}
    .taskBtn{padding:22px 16px;border-radius:14px;border:0;font-size:20px;font-weight:900;color:#fff;text-align:left;display:flex;align-items:center;gap:14px}
    .taskBtn .ic{font-size:28px}
    .swap{background:#1e79ff}
    .pump{background:#c2185b}
    .clean{background:#00796b}
    .userbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;font-size:14px;color:#1e40af}
    .ok{color:#0a7a24;font-weight:700}
    .bad{color:#b00020;font-weight:700}
    #statusMsg{margin-top:10px;font-size:14px;min-height:20px}
    .hidden{display:none!important}
    .center{text-align:center}
    .big{font-size:22px;font-weight:900;margin:10px 0}
    .countdown{font-size:48px;font-weight:900;color:#16a34a;margin:18px 0}
    .backRow{display:flex;gap:10px;margin-top:16px}
    .backRow button{flex:1}
    .pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .pill.swap{background:#dbeafe;color:#1e40af}
    .pill.pump{background:#fce7f3;color:#9d174d}
    .pill.clean{background:#ccfbf1;color:#115e59}

    .backBar{
      display:flex;align-items:center;gap:6px;
      padding:6px 10px;margin-bottom:10px;
      background:#fff;border:1px solid #e5e7eb;border-radius:10px;
      cursor:pointer;font-size:14px;font-weight:700;color:#4b5563;
      width:fit-content;
      transition:all .15s;
    }
    .backBar:hover,.backBar:active{background:#f3f4f6;border-color:#d1d5db}
    .backBar .ic{font-size:16px;line-height:1}

    .statusWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .statusCard{
      background:#fff;border-radius:24px;
      box-shadow:0 12px 32px rgba(0,0,0,.10);
      padding:36px 28px 32px;
      width:min(360px,92vw);text-align:center;
    }
    .app-header{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:24px}
    .app-dot{width:8px;height:8px;border-radius:50%;background:#4b89dc}
    .app-name{font-size:12px;font-weight:700;color:#4b89dc;letter-spacing:.04em}
    .icon-circle{
      width:72px;height:72px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:32px;margin:0 auto 16px;
    }
    .icon-circle.blue   { background:#dbeafe }
    .icon-circle.yellow { background:#fef3c7 }
    .icon-circle.red    { background:#fee2e2 }
    .icon-circle.orange { background:#ffedd5 }
    .status-title{font-size:18px;font-weight:900;margin-bottom:8px;line-height:1.4}
    .status-desc {font-size:14px;color:#6b7280;line-height:1.7;white-space:pre-wrap}
    .divider{width:40px;height:2px;background:#f3f4f6;border-radius:2px;margin:18px auto}
    .badge{display:inline-block;font-size:12px;font-weight:700;padding:5px 16px;border-radius:20px}
    .badge.blue   { background:#dbeafe;color:#1d4ed8 }
    .badge.yellow { background:#fef3c7;color:#92400e }
    .badge.red    { background:#fee2e2;color:#991b1b }
    .badge.orange { background:#ffedd5;color:#9a3412 }
    .status-row{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:#4b89dc;font-weight:700}
    .spinner-sm{
      width:14px;height:14px;border-radius:50%;
      border:2px solid #bcd3f5;border-top-color:#4b89dc;
      animation:spin .8s linear infinite;flex-shrink:0;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* 場站搜尋 */
    .ac-wrap{position:relative}
    .ac-input-wrap{position:relative}
    .ac-clear{
      position:absolute;top:50%;right:10px;transform:translateY(-50%);
      background:#e5e7eb;color:#4b5563;border:0;border-radius:50%;
      width:22px;height:22px;font-size:14px;line-height:1;padding:0;cursor:pointer;
      display:none;align-items:center;justify-content:center
    }
    .ac-clear.show{display:flex}
    .ac-list{
      position:absolute;top:calc(100% + 4px);left:0;right:0;
      background:#fff;border:1px solid #d1d5db;border-radius:10px;
      max-height:260px;overflow-y:auto;z-index:50;
      box-shadow:0 8px 24px rgba(0,0,0,.1);
      display:none
    }
    .ac-list.show{display:block}
    .ac-item{padding:10px 12px;cursor:pointer;font-size:15px;border-bottom:1px solid #f3f4f6}
    .ac-item:last-child{border-bottom:0}
    .ac-item:hover,.ac-item.active{background:#eff6ff;color:#1e40af}
    .ac-item.empty{color:#9ca3af;text-align:center;cursor:default}
    .ac-item .tag{font-size:12px;color:#6b7280;margin-left:8px}
    .ac-item:hover .tag,.ac-item.active .tag{color:#1e40af}
    .ac-picked{background:#f0fdf4!important;border-color:#86efac!important;color:#166534;font-weight:700}

    /* 車號列表 */
    .carRow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
    .carInputWrap{flex:1;min-width:0;position:relative}
    .carInput{width:100%;font-family:"JetBrains Mono","Courier New",monospace;letter-spacing:1px;padding:11px 10px}
    .carInput.invalid{border-color:#dc2626;background:#fef2f2}
    .carInput.valid{border-color:#86efac;background:#f0fdf4}
    .carBtn{
      flex-shrink:0;width:40px;height:36px;padding:0;
      font-size:18px;font-weight:900;border-radius:8px;
      display:flex;align-items:center;justify-content:center
    }
    .carBtnAdd{background:#2563eb;color:#fff;border:0}
    .carBtnDel{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
    .carBtnScan{background:#ede9fe;color:#6d28d9;border:1px solid #c4b5fd;font-size:16px}
    .carBtnScan:active{background:#ddd6fe}
    .carErrRow{font-size:12px;color:#dc2626;margin-top:-2px;margin-bottom:0px;padding-left:2px;min-height:0}

    /* 新增車號大按鈕 */
    .addRowBtn{
      width:100%;margin-top:6px;padding:10px;
      background:#eff6ff;color:#2563eb;
      border:1px dashed #93c5fd;border-radius:10px;
      font-size:14px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;
      transition:all .15s;
    }
    .addRowBtn:hover,.addRowBtn:active{background:#dbeafe;border-color:#60a5fa}
    .addRowBtn .plus{font-size:18px;font-weight:900;line-height:1}

    /* 序號標記 */
    .carSeq{
      flex-shrink:0;width:28px;height:36px;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;color:#6b7280;
      font-family:"JetBrains Mono","Courier New",monospace;
      user-select:none;
    }
    .pumpRow .carSeq{height:34px;width:24px;font-size:13px}
    @media (max-width:360px){
      .pumpRow .carSeq{width:20px;font-size:12px}
    }

    /* 打氣列 */
    .pumpRow{display:flex;gap:5px;margin-bottom:6px;align-items:center;flex-wrap:nowrap}
    .pumpRow .cell{min-width:0;position:relative}
    .pumpRow .cellCar{flex:1.6}
    .pumpRow .cellPsi{flex:1}
    .pumpRow input{
      width:100%;padding:10px 6px;
      font-family:"JetBrains Mono","Courier New",monospace;
      font-size:14px;letter-spacing:0.5px;text-align:center
    }
    .pumpRow input.psiInvalid{border-color:#dc2626;background:#fef2f2}
    .pumpRow .cellBtn{flex-shrink:0}
    .pumpRow .carBtn{width:36px;height:34px;font-size:16px}
    @media (max-width:360px){
      .pumpRow{gap:3px}
      .pumpRow input{padding:10px 4px;font-size:13px;letter-spacing:0}
      .pumpRow .carBtn{width:32px;height:34px}
    }
    .pumpHeader{
      display:flex;gap:5px;align-items:center;
      font-size:12px;color:#374151;font-weight:700;
      margin-bottom:6px;padding:0 2px
    }
    .pumpHeader .h-cell{text-align:center}
    .pumpHeader .h-seq{flex-shrink:0;width:24px}
    .pumpHeader .h-cellCar{flex:1.6}
    .pumpHeader .h-cellPsiMerged{flex:2;text-align:center}
    .pumpHeader .h-cellBtn{flex-shrink:0;width:36px}
    @media (max-width:360px){
      .pumpHeader{font-size:11px}
      .pumpHeader .h-seq{width:20px}
      .pumpHeader .h-cellBtn{width:32px}
    }

    /* ========== OCR 相機掃描視窗 ========== */
    .ocrOverlay{
      position:fixed;inset:0;background:#000;z-index:9999;
      display:none;flex-direction:column;
    }
    .ocrOverlay.show{display:flex}
    .ocrVideoWrap{
      flex:1;position:relative;overflow:hidden;background:#000;
      display:flex;align-items:center;justify-content:center;
    }
    .ocrVideo{
      width:100%;height:100%;object-fit:cover;
    }
    /* 對準框 */
    .ocrGuide{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:min(82vw,360px);height:80px;
      border:3px solid #fbbf24;border-radius:12px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.55);
      pointer-events:none;
    }
    .ocrGuideLabel{
      position:absolute;top:calc(50% - 70px);left:50%;transform:translateX(-50%);
      color:#fbbf24;font-size:13px;font-weight:700;letter-spacing:1px;
      text-shadow:0 1px 2px rgba(0,0,0,.8);
      pointer-events:none;white-space:nowrap;
    }
    .ocrTopBar{
      position:absolute;top:0;left:0;right:0;
      padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
      color:#fff;font-size:14px;font-weight:700;
      background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);
      z-index:2;
    }
    .ocrCloseBtn{
      background:rgba(255,255,255,.15);color:#fff;border:0;
      width:36px;height:36px;border-radius:50%;font-size:18px;padding:0;
      display:flex;align-items:center;justify-content:center;
    }
    .ocrBottomBar{
      padding:20px 16px calc(20px + env(safe-area-inset-bottom));
      background:#000;display:flex;gap:12px;align-items:center;justify-content:center;
    }
    .ocrShutterBtn{
      width:72px;height:72px;border-radius:50%;
      background:#fff;border:4px solid #fbbf24;
      font-size:28px;padding:0;color:#111;
      display:flex;align-items:center;justify-content:center;
    }
    .ocrShutterBtn:disabled{opacity:.5}
    .ocrHint{
      position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
      color:#fff;font-size:13px;text-align:center;
      text-shadow:0 1px 2px rgba(0,0,0,.8);
      z-index:2;white-space:nowrap;
    }
    .ocrProgress{
      position:absolute;inset:0;background:rgba(0,0,0,.75);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      color:#fff;gap:14px;z-index:3;
    }
    .ocrProgress.show{display:flex}
    .ocrSpinner{
      width:44px;height:44px;border-radius:50%;
      border:4px solid rgba(251,191,36,.3);border-top-color:#fbbf24;
      animation:spin .8s linear infinite;
    }
    .ocrProgressText{font-size:15px;font-weight:700}
    .ocrProgressSub{font-size:12px;color:#d1d5db}

    /* 多候選選擇 */
    .ocrPickWrap{
      position:absolute;inset:0;background:rgba(0,0,0,.85);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      padding:20px;gap:12px;z-index:4;
    }
    .ocrPickWrap.show{display:flex}
    .ocrPickTitle{color:#fff;font-size:15px;font-weight:700;margin-bottom:4px}
    .ocrPickBtn{
      min-width:180px;padding:14px 20px;
      background:#fff;color:#111;border:0;border-radius:12px;
      font-size:20px;font-weight:900;letter-spacing:2px;
      font-family:"JetBrains Mono","Courier New",monospace;
    }
    .ocrPickCancel{
      margin-top:8px;padding:10px 20px;
      background:transparent;color:#fff;border:1px solid #6b7280;border-radius:10px;
      font-size:14px;
    }

    /* 取景快閃 */
    .ocrFlash{
      position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:5;
      transition:opacity .08s;
    }
    .ocrFlash.show{opacity:.85}
  </style>
</head>
<body>

<div id="statusPage" class="statusWrap">
  <div class="statusCard">
    <div class="app-header">
      <div class="app-dot"></div>
      <span class="app-name">桃園營運處｜作業回報</span>
    </div>

    <div id="stateLoading">
      <div class="icon-circle blue">📋</div>
      <div class="status-title" style="color:#1d4ed8">驗證身分中</div>
      <div class="status-desc">正在確認你的帳號權限,請稍候...</div>
      <div class="status-row" style="margin-top:14px">
        <div class="spinner-sm"></div>
        連線中
      </div>
    </div>

    <div id="statePending" class="hidden">
      <div class="icon-circle yellow">⏳</div>
      <div class="status-title">申請審核中</div>
      <div class="status-desc" id="msgPending">你的申請已送出,<br/>請等待管理員開通後再試。</div>
      <div class="divider"></div>
      <span class="badge yellow">等待審核</span>
    </div>

    <div id="stateBlocked" class="hidden">
      <div class="icon-circle red">🚫</div>
      <div class="status-title" style="color:#991b1b">帳號已停用</div>
      <div class="status-desc" id="msgBlocked">你的帳號存取已被限制,<br/>請聯絡管理員處理。</div>
      <div class="divider"></div>
      <span class="badge red">無法存取</span>
    </div>

    <div id="stateError" class="hidden">
      <div class="icon-circle orange">⚠️</div>
      <div class="status-title" style="color:#92400e">系統異常</div>
      <div class="status-desc" id="msgError">系統設定有問題,<br/>請聯絡管理員確認。</div>
      <div class="divider"></div>
      <span class="badge orange">請聯絡管理員</span>
    </div>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="wrap">

    <div id="pageMenu" class="hidden">
      <div class="card">
        <div class="userbar">
          <div>👤 <span id="userName">-</span></div>
        </div>
        <h2 style="margin-top:14px">請選擇作業</h2>
        <div class="hint">點選下方作業類型開始填寫</div>
        <div class="taskGrid" style="margin-top:16px">
          <button class="taskBtn swap"  onclick="goTask('swap')"><span class="ic">🔋</span>換電作業</button>
          <button class="taskBtn pump"  onclick="goTask('pump')"><span class="ic">🚲</span>打氣作業</button>
          <button class="taskBtn clean" onclick="goTask('clean')"><span class="ic">🧹</span>清潔作業</button>
        </div>
      </div>
    </div>

    <div id="pageForm" class="hidden">

      <div class="card">
        <div class="userbar">
          <div>👤 <span id="userNameForm">-</span></div>
          <div><span id="taskPill" class="pill swap">換電作業</span></div>
        </div>

        <div class="row ac-wrap" id="stationWrap">
          <label>場站名稱<span class="req">*</span></label>
          <div class="ac-input-wrap">
            <input
              id="fStation"
              type="text"
              autocomplete="off"
              placeholder="輸入場站名稱關鍵字搜尋"
              oninput="onStationInput()"
              onfocus="onStationFocus()"
              onblur="onStationBlur()"
              onkeydown="onStationKey(event)"
            />
            <button type="button" class="ac-clear" id="fStationClear" onclick="clearStation()">×</button>
          </div>
          <div class="ac-list" id="fStationList"></div>
        </div>

        <div class="row">
          <label id="carLabel">車號<span class="req" id="carReq">*</span></label>
          <div class="hint" id="carHint" style="margin-bottom:8px">可新增多筆,一次上傳多台。點 📷 可掃描車號</div>
          <div id="carList"></div>
        </div>

        <div id="statusMsg"></div>

        <div class="backRow">
          <button class="btnSecondary" onclick="goMenu()">返回</button>
          <button id="btnSubmit" class="btnMain" onclick="submitForm()">送出</button>
        </div>
      </div>
    </div>

    <div id="pageSuccess" class="hidden">
      <div class="card center">
        <div style="font-size:56px">✅</div>
        <div class="big">送出成功</div>
        <div class="hint" id="successSummary">資料已記錄</div>
        <div class="countdown" id="countdown">3</div>
        <div class="hint">視窗即將自動關閉</div>
        <div class="backRow">
          <button class="btnSecondary" onclick="liffClose()">立即關閉</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- OCR 相機掃描視窗 -->
<div id="ocrOverlay" class="ocrOverlay">
  <div class="ocrVideoWrap">
    <video id="ocrVideo" class="ocrVideo" autoplay playsinline muted></video>

    <div class="ocrTopBar">
      <div style="display:flex;align-items:center;gap:8px">
        <span>📷 掃描車號</span>
        <span id="ocrMiniStatus" style="font-size:12px;color:#fbbf24;font-weight:400;display:none"></span>
      </div>
      <button type="button" class="ocrCloseBtn" onclick="closeOcr()">✕</button>
    </div>

    <div class="ocrGuideLabel">將車號對準黃框</div>
    <div class="ocrGuide"></div>

    <div class="ocrHint">車號為 7 位數字、開頭為 0</div>

    <div class="ocrFlash" id="ocrFlash"></div>

    <div class="ocrProgress" id="ocrProgress">
      <div class="ocrSpinner"></div>
      <div class="ocrProgressText" id="ocrProgressText">辨識中...</div>
      <div class="ocrProgressSub" id="ocrProgressSub"></div>
    </div>

    <div class="ocrPickWrap" id="ocrPickWrap">
      <div class="ocrPickTitle">辨識到多個車號,請選擇:</div>
      <div id="ocrPickList" style="display:flex;flex-direction:column;gap:10px"></div>
      <button type="button" class="ocrPickCancel" onclick="hideOcrPick()">重新掃描</button>
    </div>
  </div>

  <div class="ocrBottomBar">
    <button type="button" id="ocrShutterBtn" class="ocrShutterBtn" onclick="captureAndRecognize()">📷</button>
  </div>
</div>

<canvas id="ocrCanvas" style="display:none"></canvas>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<!-- Tesseract.js (約 700KB,首次載入模型 ~2MB 會快取) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  /* =========================================================
   * 部署設定
   * ========================================================= */
  const LIFF_ID  = "2009174277-0sLqDpFL";
  const GAS_URL  = "https://script.google.com/macros/s/AKfycbyk42RdWvnjzw8mk4V2BoKGoBr9a9g-RFRYqOlk1J7QKk-ojGsJsphamaLpzw4vA4Y/exec";
  /* ========================================================= */

  const CAR_NO_PATTERN = /^0\d{6}$/;
  const CAR_NO_PLACEHOLDER = "0301234";
  const PSI_MIN = 0;
  const PSI_MAX = 100;

  const state = {
    userId: "",
    displayName: "",
    userName: "",
    taskType: "",
    stations: [],
    pickedStation: "",
    acActiveIndex: -1,
    carNos: [""],
    pumpData: [{ carNo:"", psiFront:"", psiRear:"" }]
  };

  const TASK_LABEL = { swap: "換電作業", pump: "打氣作業", clean: "清潔作業" };

  function showStatus(name) {
    document.getElementById("statusPage").classList.remove("hidden");
    document.getElementById("appPage").classList.add("hidden");
    ["stateLoading","statePending","stateBlocked","stateError"].forEach(id => {
      document.getElementById(id).classList.toggle("hidden", id !== name);
    });
    document.body.style.background = "#eef1f5";
  }

  function showApp(pageId) {
    document.getElementById("statusPage").classList.add("hidden");
    document.getElementById("appPage").classList.remove("hidden");
    ["pageMenu","pageForm","pageSuccess"].forEach(p => {
      document.getElementById(p).classList.toggle("hidden", p !== pageId);
    });
    document.body.style.background = "#f5f6f8";
  }

  function setStatusMsg(msg, ok) {
    const el = document.getElementById("statusMsg");
    el.textContent = msg || "";
    el.className = ok ? "ok" : "bad";
  }

  async function initLiff() {
    showStatus("stateLoading");
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      state.userId = profile.userId;
      state.displayName = profile.displayName || "";
      await checkAuth();
    } catch (err) {
      document.getElementById("msgError").innerHTML =
        "登入或驗證失敗,<br/>請重新開啟後再試。<br/><br/>" + escapeHtml(err && err.message ? err.message : String(err));
      showStatus("stateError");
    }
  }

  function liffClose() {
    try {
      if (typeof liff !== "undefined") {
        if (liff.isInClient && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      }
    } catch (_) {}
    const sum = document.getElementById("successSummary");
    if (sum) sum.textContent += "(瀏覽器測試環境無法自動關閉)";
  }

  async function callApi(action, body) {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(Object.assign({ action }, body || {}))
    });
    return await res.json();
  }

  async function checkAuth() {
    let res;
    try {
      res = await callApi("checkAuth", {
        userId: state.userId,
        displayName: state.displayName
      });
    } catch (err) {
      document.getElementById("msgError").innerHTML =
        "連線失敗,<br/>請確認網路後重新開啟。<br/><br/>" + escapeHtml(err && err.message ? err.message : String(err));
      showStatus("stateError");
      return;
    }

    const st = String(res.authStatus || "").toLowerCase();

    if (res.ok && res.canUse) {
      state.userName = res.userName || state.displayName;
      document.getElementById("userName").textContent = state.userName;
      document.getElementById("userNameForm").textContent = state.userName;

      try {
        const r = await callApi("getStations", {});
        if (r.ok) state.stations = r.stations || [];
      } catch (_) {}

      showApp("pageMenu");
      return;
    }

    if (st === "pending" || st === "not_found") {
      document.getElementById("msgPending").innerHTML =
        "你的帳號尚未開通,申請已自動送出,<br/>請等待管理員開通後再試。";
      showStatus("statePending");
      return;
    }
    if (st === "blocked") {
      document.getElementById("msgBlocked").innerHTML =
        "你的帳號存取已被限制,<br/>請聯絡管理員處理。";
      showStatus("stateBlocked");
      return;
    }
    if (st === "disabled") {
      document.getElementById("msgBlocked").innerHTML =
        "此帳號目前停用,<br/>請聯絡管理員處理。";
      showStatus("stateBlocked");
      return;
    }
    if (st === "config_error") {
      document.getElementById("msgError").innerHTML =
        "尚未設定權限名單,<br/>請聯絡管理員確認。";
      showStatus("stateError");
      return;
    }

    document.getElementById("msgError").innerHTML =
      escapeHtml(res.message || "發生未知錯誤,請重新開啟後再試。");
    showStatus("stateError");
  }

  function goMenu() {
    state.taskType = "";
    state.pickedStation = "";
    state.carNos = [""];
    state.pumpData = [{ carNo:"", psiFront:"", psiRear:"" }];
    setStatusMsg("", true);
    showApp("pageMenu");
  }

  function goTask(type) {
    state.taskType = type;
    state.pickedStation = "";
    state.carNos = [""];
    state.pumpData = [{ carNo:"", psiFront:"", psiRear:"" }];

  /* 場站搜尋 */
  function onStationInput() {
    const input = document.getElementById("fStation");
    const q = input.value.trim();

    if (state.pickedStation && state.pickedStation !== q) {
      state.pickedStation = "";
      input.classList.remove("ac-picked");
    }
    document.getElementById("fStationClear").classList.toggle("show", !!q);

    renderStationList(q);
    state.acActiveIndex = -1;
  }

  function onStationFocus() {
    const input = document.getElementById("fStation");
    renderStationList(input.value.trim());
  }

  function onStationBlur() {
    setTimeout(() => {
      document.getElementById("fStationList").classList.remove("show");
    }, 200);
  }

  function onStationKey(e) {
    const list = document.getElementById("fStationList");
    const items = list.querySelectorAll(".ac-item:not(.empty)");
    if (!list.classList.contains("show") || items.length === 0) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      state.acActiveIndex = Math.min(state.acActiveIndex + 1, items.length - 1);
      updateAcActive(items);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      state.acActiveIndex = Math.max(state.acActiveIndex - 1, 0);
      updateAcActive(items);
    } else if (e.key === "Enter") {
      e.preventDefault();
      const idx = state.acActiveIndex >= 0 ? state.acActiveIndex : 0;
      const name = items[idx].getAttribute("data-name");
      if (name) pickStation(name);
    } else if (e.key === "Escape") {
      list.classList.remove("show");
    }
  }

  function updateAcActive(items) {
    items.forEach((it, i) => it.classList.toggle("active", i === state.acActiveIndex));
    if (state.acActiveIndex >= 0 && items[state.acActiveIndex]) {
      items[state.acActiveIndex].scrollIntoView({ block: "nearest" });
    }
  }

  function renderStationList(keyword) {
    const list = document.getElementById("fStationList");
    const kw = String(keyword || "").trim().toLowerCase();

    let candidates = state.stations.slice();
    if (kw) {
      candidates = candidates.filter(s =>
        s.station.toLowerCase().includes(kw)
      );
    }

    const seen = new Set();
    const unique = [];
    for (const s of candidates) {
      if (seen.has(s.station)) continue;
      seen.add(s.station);
      unique.push(s);
    }

    unique.sort((a, b) => a.station.localeCompare(b.station, "zh-Hant"));

    const MAX = 50;
    const shown = unique.slice(0, MAX);

    if (shown.length === 0) {
      list.innerHTML = '<div class="ac-item empty">找不到符合的場站</div>';
    } else {
      list.innerHTML = shown.map(s => {
        const tag = (s.district && s.zone) ? '<span class="tag">' + escapeHtml(s.district) + ' / ' + escapeHtml(s.zone) + '</span>' : '';
        return '<div class="ac-item" data-name="' + escapeHtml(s.station) + '" onmousedown="pickStation(\'' + escapeJs(s.station) + '\')">' + escapeHtml(s.station) + tag + '</div>';
      }).join("") + (unique.length > MAX ? '<div class="ac-item empty">還有 ' + (unique.length - MAX) + ' 筆...請輸入更精確的關鍵字</div>' : "");
    }

    list.classList.add("show");
    state.acActiveIndex = -1;
  }

  function pickStation(name) {
    const match = state.stations.find(s => s.station === name);
    if (!match) return;
    state.pickedStation = match.station;
    const input = document.getElementById("fStation");
    input.value = match.station;
    input.classList.add("ac-picked");
    document.getElementById("fStationClear").classList.add("show");
    document.getElementById("fStationList").classList.remove("show");
  }

  function clearStation() {
    state.pickedStation = "";
    const input = document.getElementById("fStation");
    input.value = "";
    input.classList.remove("ac-picked");
    document.getElementById("fStationClear").classList.remove("show");
    input.focus();
  }

  /* 車號區域 */
  function renderCarArea() {
    if (state.taskType === "pump") renderPumpList();
    else renderCarList();
  }

  function renderCarList() {
    const wrap = document.getElementById("carList");
    const canDel = state.carNos.length > 1;
    const rows = state.carNos.map((val, i) => {
      const valClass = validClassFor(val);
      const errMsg = errMsgFor(val);

      return '<div class="carRow">' +
        '<div class="carSeq">' + (i + 1) + '.</div>' +
        '<div class="carInputWrap">' +
          '<input class="carInput ' + valClass + '" ' +
            'type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="7" ' +
            'placeholder="' + CAR_NO_PLACEHOLDER + '" ' +
            'value="' + escapeHtml(val) + '" ' +
            'oninput="onCarInput(' + i + ', this)" />' +
        '</div>' +
        '<button type="button" class="carBtn carBtnScan" onclick="openOcr(' + i + ', \'car\')" title="掃描車號">📷</button>' +
        '<button type="button" class="carBtn carBtnDel" onclick="removeRow(' + i + ')"' + (canDel ? '' : ' disabled') + '>−</button>' +
      '</div>' +
      '<div class="carErrRow">' + escapeHtml(errMsg) + '</div>';
    }).join("");

    const addBtn = '<button type="button" class="addRowBtn" onclick="addRow()"><span class="plus">+</span>新增車號</button>';

  function renderPumpList() {
    const wrap = document.getElementById("carList");

    const header =
      '<div class="pumpHeader">' +
        '<div class="h-seq"></div>' +
        '<div class="h-cell h-cellCar">車號</div>' +
        '<div class="h-cell h-cellPsiMerged">打氣前胎壓</div>' +
        '<div class="h-cell h-cellBtn"></div>' +
      '</div>';

    const rows = state.pumpData.map((item, i) => {
      const carVal = item.carNo || "";
      const valClass = validClassFor(carVal);
      const errMsg = errMsgFor(carVal);
      const canDel = state.pumpData.length > 1;

      const psiFrontInvalid = isPsiInvalid(item.psiFront) ? "psiInvalid" : "";
      const psiRearInvalid  = isPsiInvalid(item.psiRear)  ? "psiInvalid" : "";

      return '<div class="pumpRow">' +
        '<div class="carSeq">' + (i + 1) + '.</div>' +
        '<div class="cell cellCar" style="display:flex;gap:3px;align-items:center">' +
          '<input class="carInput ' + valClass + '" style="flex:1" ' +
            'type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="7" ' +
            'placeholder="' + CAR_NO_PLACEHOLDER + '" ' +
            'value="' + escapeHtml(carVal) + '" ' +
            'oninput="onPumpCarInput(' + i + ', this)" />' +
          '<button type="button" class="carBtn carBtnScan" onclick="openOcr(' + i + ', \'pump\')" title="掃描車號">📷</button>' +
        '</div>' +
        '<div class="cell cellPsi">' +
          '<input type="number" inputmode="decimal" step="0.1" ' +
            'min="' + PSI_MIN + '" max="' + PSI_MAX + '" ' +
            'class="' + psiFrontInvalid + '" ' +
            'placeholder="前輪" ' +
            'value="' + escapeHtml(item.psiFront || "") + '" ' +
            'oninput="onPumpPsiInput(' + i + ', \'psiFront\', this)" />' +
        '</div>' +
        '<div class="cell cellPsi">' +
          '<input type="number" inputmode="decimal" step="0.1" ' +
            'min="' + PSI_MIN + '" max="' + PSI_MAX + '" ' +
            'class="' + psiRearInvalid + '" ' +
            'placeholder="後輪" ' +
            'value="' + escapeHtml(item.psiRear || "") + '" ' +
            'oninput="onPumpPsiInput(' + i + ', \'psiRear\', this)" />' +
        '</div>' +
        '<div class="cell cellBtn">' +
          '<button type="button" class="carBtn carBtnDel" onclick="removeRow(' + i + ')"' + (canDel ? '' : ' disabled') + '>−</button>' +
        '</div>' +
      '</div>' +
      '<div class="carErrRow">' + escapeHtml(errMsg) + '</div>';
    }).join("");

    const addBtn = '<button type="button" class="addRowBtn" onclick="addRow()"><span class="plus">+</span>新增車號</button>';
    wrap.innerHTML = header + rows + addBtn;

  function validClassFor(val) {
    if (!val) return "";
    return CAR_NO_PATTERN.test(val) ? "valid" : "invalid";
  }

  function errMsgFor(val) {
    if (!val || CAR_NO_PATTERN.test(val)) return "";
    if (val.length !== 7) return "車號需 7 位數";
    if (!val.startsWith("0")) return "車號開頭必須為 0";
    return "車號格式錯誤";
  }

  function isPsiInvalid(val) {
    const s = String(val || "").trim();
    if (!s) return false;
    const n = Number(s);
    if (!isFinite(n)) return true;
    return n < PSI_MIN || n > PSI_MAX;
  }

  function onCarInput(idx, input) {
    const cleaned = String(input.value || "").replace(/\D/g, "").slice(0, 7);
    state.carNos[idx] = cleaned;
    if (input.value !== cleaned) input.value = cleaned;

    input.classList.remove("valid","invalid");
    const c = validClassFor(cleaned);
    if (c) input.classList.add(c);

    const errRow = input.closest(".carRow").nextElementSibling;
    if (errRow && errRow.classList.contains("carErrRow")) {
      errRow.textContent = errMsgFor(cleaned);
    }
  }

  function onPumpCarInput(idx, input) {
    const cleaned = String(input.value || "").replace(/\D/g, "").slice(0, 7);
    state.pumpData[idx].carNo = cleaned;
    if (input.value !== cleaned) input.value = cleaned;

    input.classList.remove("valid","invalid");
    const c = validClassFor(cleaned);
    if (c) input.classList.add(c);

    const errRow = input.closest(".pumpRow").nextElementSibling;
    if (errRow && errRow.classList.contains("carErrRow")) {
      errRow.textContent = errMsgFor(cleaned);
    }
  }

  function onPumpPsiInput(idx, key, input) {
    let v = input.value;
    if (v !== "" && isFinite(Number(v))) {
      const n = Number(v);
      if (n > PSI_MAX) {
        v = String(PSI_MAX);
        input.value = v;
      } else if (n < PSI_MIN) {
        v = String(PSI_MIN);
        input.value = v;
      }
    }
    state.pumpData[idx][key] = v;
    input.classList.toggle("psiInvalid", isPsiInvalid(v));
  }

  function addRow() {
    if (state.taskType === "pump") {
      state.pumpData.push({ carNo:"", psiFront:"", psiRear:"" });
    } else {
      state.carNos.push("");
    }
    renderCarArea();
    setTimeout(() => {
      const lastRow = document.querySelectorAll("#carList .pumpRow, #carList .carRow");
      if (lastRow.length) {
        const firstInput = lastRow[lastRow.length - 1].querySelector("input");
        if (firstInput) firstInput.focus();
      }
    }, 0);
  }

  function removeRow(idx) {
    if (state.taskType === "pump") {
      if (state.pumpData.length <= 1) return;
      state.pumpData.splice(idx, 1);
    } else {
      if (state.carNos.length <= 1) return;
      state.carNos.splice(idx, 1);
    }
    renderCarArea();
  }

  function escapeHtml(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }
  function escapeJs(s){
    return String(s == null ? "" : s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  }

  /* ============================================================
   * OCR 掃描車號 (Tesseract.js)
   * ============================================================ */
  const ocr = {
    stream: null,
    worker: null,
    workerReady: false,
    workerInitializing: false,
    targetIdx: -1,
    targetKind: "" // "car" | "pump"
  };

  // 延遲初始化 worker
  // showProgress=true 時顯示全屏進度條(按快門時用)
  // showProgress=false 時只更新左上角小提示(背景預載時用)
  async function ensureOcrWorker(showProgress) {
    if (ocr.workerReady) return ocr.worker;
    if (ocr.workerInitializing) {
      // 等現有的初始化完成
      while (ocr.workerInitializing) {
        await new Promise(r => setTimeout(r, 100));
      }
      // 如果需要顯示進度(按快門進來等待完成),結束時把小提示關掉
      if (showProgress) hideOcrProgress();
      setOcrMiniStatus("");
      return ocr.worker;
    }

    ocr.workerInitializing = true;
    try {
      if (showProgress) {
        setOcrProgress("載入辨識引擎...", "首次使用需下載模型(約 2MB)");
      } else {
        setOcrMiniStatus("引擎載入中...");
      }

      const worker = await Tesseract.createWorker("eng", 1, {
        logger: m => {
          const pct = Math.round((m.progress || 0) * 100);
          let text = "", sub = "";
          if (m.status === "loading tesseract core") {
            text = "載入辨識引擎..."; sub = "下載核心 " + pct + "%";
          } else if (m.status === "loading language traineddata") {
            text = "載入辨識引擎..."; sub = "下載語言資料 " + pct + "%";
          } else if (m.status === "initializing api") {
            text = "載入辨識引擎..."; sub = "準備中 " + pct + "%";
          } else if (m.status === "recognizing text") {
            text = "辨識中..."; sub = pct + "%";
          } else {
            return;
          }

          if (showProgress) {
            setOcrProgress(text, sub);
          } else {
            // 背景預載:不擋畫面,只在左上角顯示簡短狀態
            setOcrMiniStatus(text === "辨識中..." ? "辨識中 " + pct + "%" : "引擎載入中 " + pct + "%");
          }
        }
      });

      await worker.setParameters({
        tessedit_char_whitelist: "0123456789",
        tessedit_pageseg_mode: Tesseract.PSM ? Tesseract.PSM.SINGLE_LINE : "7"
      });

      ocr.worker = worker;
      ocr.workerReady = true;

      // 載完要把 UI 關掉(logger 不會主動清)
      hideOcrProgress();
      setOcrMiniStatus("");

      return worker;
    } catch (err) {
      hideOcrProgress();
      setOcrMiniStatus("");
      throw err;
    } finally {
      ocr.workerInitializing = false;
    }
  }

  async function openOcr(idx, kind) {
    ocr.targetIdx = idx;
    ocr.targetKind = kind;

    document.getElementById("ocrOverlay").classList.add("show");
    hideOcrProgress();
    hideOcrPick();

    // 開啟相機
    try {
      ocr.stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width:  { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
      const video = document.getElementById("ocrVideo");
      video.srcObject = ocr.stream;
      await video.play().catch(() => {});
    } catch (err) {
      alert("無法開啟相機:" + (err && err.message ? err.message : err) + "\n請確認已授權相機權限");
      closeOcr();
      return;
    }

    // 背景預先載入 OCR worker (不擋 UI,只在左上角顯示小字)
    ensureOcrWorker(false).catch(() => {});
  }

  function closeOcr() {
    const overlay = document.getElementById("ocrOverlay");
    overlay.classList.remove("show");
    hideOcrProgress();
    hideOcrPick();
    setOcrMiniStatus("");

    if (ocr.stream) {
      ocr.stream.getTracks().forEach(t => t.stop());
      ocr.stream = null;
    }
    const video = document.getElementById("ocrVideo");
    try { video.pause(); } catch(_) {}
    video.srcObject = null;
  }

  function setOcrProgress(text, sub) {
    const p = document.getElementById("ocrProgress");
    p.classList.add("show");
    document.getElementById("ocrProgressText").textContent = text || "辨識中...";
    document.getElementById("ocrProgressSub").textContent  = sub  || "";
  }

  function hideOcrProgress() {
    document.getElementById("ocrProgress").classList.remove("show");
  }

  // 左上角的小狀態提示(不擋畫面)
  function setOcrMiniStatus(text) {
    const el = document.getElementById("ocrMiniStatus");
    if (!el) return;
    if (text) {
      el.textContent = text;
      el.style.display = "";
    } else {
      el.textContent = "";
      el.style.display = "none";
    }
  }

  function showOcrPick(candidates) {
    const list = document.getElementById("ocrPickList");
    list.innerHTML = candidates.map(c =>
      '<button type="button" class="ocrPickBtn" onclick="pickOcrResult(\'' + escapeJs(c) + '\')">' + escapeHtml(c) + '</button>'
    ).join("");
    document.getElementById("ocrPickWrap").classList.add("show");
  }

  function hideOcrPick() {
    document.getElementById("ocrPickWrap").classList.remove("show");
  }

  function pickOcrResult(carNo) {
    applyOcrResult(carNo);
  }

  async function captureAndRecognize() {
    const shutter = document.getElementById("ocrShutterBtn");
    if (shutter.disabled) return;
    shutter.disabled = true;

    // 快閃動畫
    const flash = document.getElementById("ocrFlash");
    flash.classList.add("show");
    setTimeout(() => flash.classList.remove("show"), 120);

    try {
      // 1. 從 video 擷取當前幀
      const video = document.getElementById("ocrVideo");
      const canvas = document.getElementById("ocrCanvas");
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) {
        alert("相機尚未就緒,請稍候再試");
        return;
      }

      // 2. 計算對準框在 video 座標中的位置
      //    對準框在畫面上是置中、寬度 min(82vw,360px)、高度 80px
      //    video 以 object-fit:cover 顯示,所以需把 CSS 座標換算到 video 實際像素
      const videoRect = video.getBoundingClientRect();
      const guideEl = document.querySelector(".ocrGuide");
      const guideRect = guideEl.getBoundingClientRect();

      // cover 模式:video 的實際像素比例 vs 顯示大小
      const scaleX = vw / videoRect.width;
      const scaleY = vh / videoRect.height;
      // cover 會取較大的縮放,反推在 video 座標裡對準框的位置
      const scale = Math.max(scaleX, scaleY);
      const displayedW = vw / scale; // video 在畫面上實際顯示的寬度
      const displayedH = vh / scale;
      const offsetX = (videoRect.width  - displayedW) / 2;
      const offsetY = (videoRect.height - displayedH) / 2;

      let cropX = Math.round((guideRect.left - videoRect.left - offsetX) * scale);
      let cropY = Math.round((guideRect.top  - videoRect.top  - offsetY) * scale);
      let cropW = Math.round(guideRect.width  * scale);
      let cropH = Math.round(guideRect.height * scale);

      // 邊界保護
      cropX = Math.max(0, Math.min(cropX, vw - 10));
      cropY = Math.max(0, Math.min(cropY, vh - 10));
      cropW = Math.min(cropW, vw - cropX);
      cropH = Math.min(cropH, vh - cropY);

      // 3. 把裁切區放大到辨識用的 canvas (放大 + 灰階 + 二值化)
      const TARGET_W = 600;
      const ratio = TARGET_W / cropW;
      const TARGET_H = Math.round(cropH * ratio);
      canvas.width  = TARGET_W;
      canvas.height = TARGET_H;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, TARGET_W, TARGET_H);

      // 灰階 + 對比增強
      const imgData = ctx.getImageData(0, 0, TARGET_W, TARGET_H);
      const d = imgData.data;
      // 先算平均亮度
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) {
        sum += (d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114);
      }
      const avg = sum / (d.length / 4);
      const threshold = avg * 0.85; // 稍微偏暗的門檻,避免文字被吃掉
      for (let i = 0; i < d.length; i += 4) {
        const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
        const v = gray < threshold ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = v;
      }
      ctx.putImageData(imgData, 0, 0);

      // 4. 丟給 Tesseract
      setOcrProgress("辨識中...", "0%");
      const worker = await ensureOcrWorker(true);
      const { data } = await worker.recognize(canvas);

      hideOcrProgress();

      const text = (data && data.text) ? data.text : "";
      const digits = text.replace(/\D/g, "");

      // 5. 抓符合格式的車號
      const candidates = extractCarNoCandidates(digits);

      if (candidates.length === 0) {
        // 嘗試寬鬆抓:取連續 7 位數
        const looseMatch = digits.match(/\d{7}/g);
        if (looseMatch && looseMatch.length > 0) {
          // 找不到 0 開頭,但有 7 位數,給使用者看看是不是辨識錯
          alert("辨識到:" + looseMatch.join("、") + "\n但不符合車號格式(需 0 開頭)\n請重新對準或手動輸入");
        } else {
          alert("辨識失敗,請重新對準黃框再拍一次\n(辨識結果:" + (text.trim() || "(無)") + ")");
        }
        return;
      }

      if (candidates.length === 1) {
        applyOcrResult(candidates[0]);
      } else {
        showOcrPick(candidates);
      }
    } catch (err) {
      hideOcrProgress();
      alert("辨識發生錯誤:" + (err && err.message ? err.message : err));
    } finally {
      shutter.disabled = false;
    }
  }

  // 從 OCR 純數字字串抽取「0 開頭 + 7 位」候選
  function extractCarNoCandidates(digits) {
    const set = new Set();
    const results = [];
    for (let i = 0; i <= digits.length - 7; i++) {
      const seg = digits.substr(i, 7);
      if (/^0\d{6}$/.test(seg)) {
        if (!set.has(seg)) {
          set.add(seg);
          results.push(seg);
        }
      }
    }
    return results;
  }

  function applyOcrResult(carNo) {
    const idx = ocr.targetIdx;
    const kind = ocr.targetKind;
    if (idx < 0) { closeOcr(); return; }

    if (kind === "pump") {
      if (state.pumpData[idx]) state.pumpData[idx].carNo = carNo;
    } else {
      if (idx < state.carNos.length) state.carNos[idx] = carNo;
    }
    renderCarArea();
    closeOcr();
  }

  async function submitForm() {
    const btn = document.getElementById("btnSubmit");

    if (!state.pickedStation) {
      setStatusMsg("請從建議清單中點選場站(不能只打關鍵字)", false);
      return;
    }
    const stationInputValue = document.getElementById("fStation").value.trim();
    if (stationInputValue !== state.pickedStation) {
      setStatusMsg("場站與輸入內容不一致,請重新選擇", false);
      return;
    }

    const body = {
      userId: state.userId,
      displayName: state.displayName,
      taskType: state.taskType,
      station: state.pickedStation
    };

    if (state.taskType === "pump") {
      const filled = state.pumpData.filter(it =>
        (it.carNo && String(it.carNo).trim()) ||
        (it.psiFront && String(it.psiFront).trim()) ||
        (it.psiRear  && String(it.psiRear ).trim())
      );
      if (filled.length === 0) { setStatusMsg("請至少輸入一筆資料", false); return; }

      for (let i = 0; i < filled.length; i++) {
        const it = filled[i];
        const carNo = String(it.carNo || "").trim();
        const pf = String(it.psiFront || "").trim();
        const pr = String(it.psiRear  || "").trim();
        if (!CAR_NO_PATTERN.test(carNo)) {
          setStatusMsg("第 " + (i+1) + " 列車號格式錯誤(需 7 位數且開頭為 0)", false); return;
        }
        if (!pf || !pr) { setStatusMsg("第 " + (i+1) + " 列前/後胎壓必填", false); return; }
        if (!isFinite(Number(pf)) || !isFinite(Number(pr))) {
          setStatusMsg("第 " + (i+1) + " 列胎壓須為數字", false); return;
        }
        const nf = Number(pf), nr = Number(pr);
        if (nf < PSI_MIN || nf > PSI_MAX || nr < PSI_MIN || nr > PSI_MAX) {
          setStatusMsg("第 " + (i+1) + " 列胎壓需在 " + PSI_MIN + "-" + PSI_MAX + " 之間", false); return;
        }
      }

      const seen = new Set();
      const unique = [];
      for (const it of filled) {
        const c = String(it.carNo).trim();
        if (seen.has(c)) continue;
        seen.add(c);
        unique.push({ carNo:c, psiFront:String(it.psiFront).trim(), psiRear:String(it.psiRear).trim() });
      }

      body.pumpData = unique;
    } else {
      const cleaned = state.carNos.map(c => String(c || "").trim()).filter(c => c);

      if (state.taskType === "clean" && cleaned.length === 0) {
        body.carNos = ["純清潔場站"];
      } else {
        if (cleaned.length === 0) { setStatusMsg("請至少輸入一個車號", false); return; }
        const invalid = cleaned.filter(c => !CAR_NO_PATTERN.test(c));
        if (invalid.length > 0) {
          setStatusMsg("車號格式錯誤(需 7 位數且開頭為 0):" + invalid.join("、"), false); return;
        }
        body.carNos = Array.from(new Set(cleaned));
      }
    }

    btn.disabled = true;
    setStatusMsg("送出中...", true);

    try {
      const res = await callApi("submitTask", body);

      if (!res.ok) {
        btn.disabled = false;
        setStatusMsg(res.message || "送出失敗", false);
        return;
      }

      document.getElementById("successSummary").textContent =
        "已記錄 " + (res.count || 0) + " 筆資料";
      showApp("pageSuccess");
      startCountdown(3);
    } catch (err) {
      btn.disabled = false;
      setStatusMsg("連線失敗:" + (err && err.message ? err.message : err), false);
    }
  }

  function startCountdown(sec) {
    const el = document.getElementById("countdown");
    let n = sec;
    el.textContent = n;
    const t = setInterval(() => {
      n--;
      if (n <= 0) { clearInterval(t); liffClose(); }
      else { el.textContent = n; }
    }, 1000);
  }

  // 關閉頁面時清掉相機
  window.addEventListener("pagehide", () => {
    if (ocr.stream) {
      ocr.stream.getTracks().forEach(t => t.stop());
      ocr.stream = null;
    }
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initLiff);
  } else {
    initLiff();
  }
</script>
</body>

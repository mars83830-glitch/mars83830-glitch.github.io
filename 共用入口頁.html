<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>桃園營運處｜排班系統入口</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --bg:#eef1f5;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#d9dee7;
      --primary:#4b89dc;
      --danger:#dc2626;
      --ok:#15803d;
      --shadow:0 10px 28px rgba(0,0,0,.08);
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0; width:100%; min-height:100%;
      background:var(--bg); color:var(--text);
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    }
    .app{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .card{
      width:100%;
      max-width:520px;
      background:var(--card);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:20px 18px;
    }
    .title{
      margin:0 0 8px;
      text-align:center;
      font-size:26px;
      font-weight:900;
      line-height:1.3;
    }
    .subtitle{
      margin:0 0 16px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }
    .status{
      border:1px solid var(--line);
      border-radius:16px;
      background:#f9fafb;
      padding:14px;
      font-size:15px;
      line-height:1.8;
      white-space:pre-wrap;
    }
    .status.ok{
      border-color:#bbf7d0;
      background:#f0fdf4;
      color:#166534;
      font-weight:900;
    }
    .status.err{
      border-color:#fecaca;
      background:#fff7ed;
      color:#9a3412;
      font-weight:900;
    }
    .kv{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }
    .row{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:10px;
      padding:11px 14px;
      border-top:1px solid var(--line);
      font-size:14px;
      line-height:1.5;
    }
    .row:first-child{ border-top:none; }
    .k{ color:var(--muted); font-weight:800; }
    .v{ font-weight:900; word-break:break-all; }
    .actions{
      display:flex;
      justify-content:center;
      margin-top:16px;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      height:42px;
      border:none;
      border-radius:12px;
      padding:0 16px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }
    .btn-primary{
      background:linear-gradient(180deg,#5d9af0 0%, #4b89dc 100%);
      color:#fff;
    }
    .btn-secondary{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }
    .hidden{ display:none !important; }
    .small{
      margin-top:12px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1 class="title">桃園營運處｜排班系統入口</h1>
      <p class="subtitle">登入後會依身分與前台類型，自動帶你進入對應頁面。</p>

      <div id="statusBox" class="status">啟動中...</div>

      <div id="infoBox" class="kv hidden">
        <div class="row"><div class="k">LINE 名稱</div><div class="v" id="lineNameText">-</div></div>
        <div class="row"><div class="k">身分別</div><div class="v" id="identityText">-</div></div>
        <div class="row"><div class="k">前台類型</div><div class="v" id="frontendText">-</div></div>
        <div class="row"><div class="k">狀態</div><div class="v" id="statusText">-</div></div>
      </div>

      <div class="actions">
        <button id="retryBtn" class="btn-secondary hidden" onclick="startFlow()">重新判定</button>
        <button id="openBtn" class="btn-primary hidden" onclick="openResolvedTarget()">進入排班前台</button>
      </div>

      <div class="small" id="smallText">系統會自動完成判定與跳轉。</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009174277-Dwu3ebuB';
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbynmvNtFOWo3_cT9WtPjLCx3iGjp1lP99Q5SOLUba3SbE7oltxPUJc0tX4zI-B_M0vN/exec';

    const PT_FRONTEND_URL = 'https://mars83830-glitch.github.io/schedule.html';
    const FT_FRONTEND_URL = '';

    const state = {
      userId: '',
      displayName: '',
      resolved: null
    };

    function setStatus(msg, type){
      const box = document.getElementById('statusBox');
      box.className = `status ${type || ''}`;
      box.textContent = msg || '';
    }

    function toggle(id, show){
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('hidden', !show);
    }

    function fillResult(data){
      document.getElementById('lineNameText').textContent = state.displayName || '-';
      document.getElementById('identityText').textContent = data.identityType || '-';
      document.getElementById('frontendText').textContent = data.frontendType || '-';
      document.getElementById('statusText').textContent = data.status || '-';
      toggle('infoBox', true);
    }

    function getResolvedTargetUrl(data){
      const type = String(data?.frontendType || '').trim().toUpperCase();
      if (type === 'PT') return PT_FRONTEND_URL;
      if (type === 'FT') return FT_FRONTEND_URL;
      return '';
    }

    function openResolvedTarget(){
      const type = String(state.resolved?.frontendType || '').trim().toUpperCase();
      const url = getResolvedTargetUrl(state.resolved);

      if (type === 'FT' && !url) {
        setStatus('FT 前台尚未完成，請先聯絡管理員。', 'err');
        toggle('retryBtn', true);
        return;
      }

      if (!url) {
        setStatus('判定完成，但前台網址尚未設定完成。', 'err');
        toggle('retryBtn', true);
        return;
      }

      window.location.href = url;
    }

    async function getJson(url){
      const res = await fetch(url, { method:'GET' });
      return await res.json();
    }

    async function startFlow(){
      toggle('retryBtn', false);
      toggle('openBtn', false);
      toggle('infoBox', false);

      try{
        setStatus('登入中，請稍候...', '');

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        state.userId = profile.userId || '';
        state.displayName = profile.displayName || '';

        setStatus('判定入口中，請稍候...', '');

        const url = `${GAS_WEB_APP_URL}?action=resolveEntrance&uid=${encodeURIComponent(state.userId)}&displayName=${encodeURIComponent(state.displayName)}`;
        const data = await getJson(url);
        state.resolved = data || null;

        if (!data || !data.ok) {
          throw new Error((data && data.message) || '入口判定失敗');
        }

        fillResult(data);

        if (!data.allowed) {
          setStatus(data.message || '目前無法進入排班前台。', 'err');
          toggle('retryBtn', true);
          return;
        }

        const targetType = String(data.frontendType || '').trim().toUpperCase();
        const targetUrl = getResolvedTargetUrl(data);

        if (targetType === 'FT' && !targetUrl) {
          setStatus('你的權限是 FT，但 FT 前台尚未完成。', 'err');
          toggle('retryBtn', true);
          return;
        }

        if (!targetUrl) {
          setStatus('判定完成，但前台網址尚未設定完成。', 'err');
          toggle('retryBtn', true);
          return;
        }

        setStatus((data.message || '判定完成，準備跳轉...') + '\n\n3 秒後自動進入對應前台。', 'ok');
        toggle('openBtn', true);

        setTimeout(() => {
          openResolvedTarget();
        }, 3000);
      } catch(err){
        setStatus('登入或入口判定失敗，請重新開啟後再試。\n\n' + String(err && err.message ? err.message : err), 'err');
        toggle('retryBtn', true);
      }
    }

    startFlow();
  </script>
</body>
</html>

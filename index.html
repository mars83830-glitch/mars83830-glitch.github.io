<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>桃園營運處｜打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f4f6f9;
      --card:     #ffffff;
      --border:   #e2e8f0;
      --text:     #1a202c;
      --muted:    #718096;

      --dispatch-a: #22c55e;
      --dispatch-l: #15803d;
      --level1-a:   #f59e0b;
      --level1-l:   #b45309;
      --swap-a:     #3b82f6;
      --swap-l:     #1d4ed8;
      --pump-a:     #ec4899;
      --pump-l:     #9d174d;
      --clean-a:    #14b8a6;
      --clean-l:    #0f766e;
      --rest-a:     #334155;
      --rest-l:     #0f172a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
    }

    /* ── Shell ─────────────────────────────── */
    .shell {
      height: 100dvh;
      height: 100svh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
      overflow: hidden;
    }

    /* ── Header: hidden ─────────────────────── */
    .hd { display: none; }

    /* ── Info strip (2 rows) ───────────────── */
    .info-strip {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 7px 12px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .strip-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      font-size: 16px;
      font-weight: 700;
    }

    .strip-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .strip-dot.green  { background: #22c55e; }
    .strip-dot.red    { background: #ef4444; }
    .strip-dot.gray   { background: #94a3b8; }
    .strip-dot.clock  { background: #a78bfa; }

    .strip-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: .3px;
    }
    .strip-val { color: var(--text); font-size: 16px; font-weight: 700; }
    .strip-val.ok  { color: #16a34a; }
    .strip-val.err { color: #dc2626; }
    .strip-val.muted { color: var(--muted); }

    /* ── Auth box ──────────────────────────── */
    /* ── Auth gate (full-screen, no permission) ── */
    .auth-gate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #f4f6f9;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 0;
    }
    .auth-gate.show { display: flex; }

    .auth-gate-icon {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 20px;
    }
    .auth-gate-title {
      font-size: 22px;
      font-weight: 800;
      color: #1a202c;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: .3px;
    }
    .auth-gate-msg {
      font-size: 16px;
      font-weight: 500;
      color: #4a5568;
      text-align: center;
      line-height: 1.75;
      margin-bottom: 28px;
      max-width: 300px;
    }
    .auth-gate-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .4px;
      margin-bottom: 28px;
    }
    .auth-gate-badge.pending  { background: #eff6ff; color: #1d4ed8; border: 1.5px solid #bfdbfe; }
    .auth-gate-badge.blocked  { background: #fef2f2; color: #b91c1c; border: 1.5px solid #fecaca; }
    .auth-gate-badge.disabled { background: #f9fafb; color: #6b7280; border: 1.5px solid #d1d5db; }
    .auth-gate-badge.error    { background: #fff7ed; color: #c2410c; border: 1.5px solid #fed7aa; }

    .auth-gate-contact {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Grid ──────────────────────────────── */
    .grid {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 8px;
      padding: 8px 10px;
      min-height: 0;
    }

    /* ── Job cell ──────────────────────────── */
    .job {
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      background: var(--card);
      min-height: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .job.rest-job {
      background: #0f172a;
      border-color: #1e293b;
    }

    .job-label {
      font-size: clamp(20px, 6vw, 32px);
      font-weight: 900;
      text-align: center;
      padding: 7px 4px 5px;
      color: var(--text);
      flex-shrink: 0;
      letter-spacing: .3px;
    }
    .rest-job .job-label { color: #f1f5f9; }

    /* Portrait: buttons stacked vertically */
    .job-btns {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 5px;
      padding: 0 6px 6px;
      min-height: 0;
    }

    /* Landscape: buttons side by side */
    @media (orientation: landscape) {
      .job-btns { flex-direction: row; }

      /* landscape grid: 3 cols × 2 rows so all 6 fit wide */
      .grid {
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr;
      }

      /* tighter info strip in landscape */
      .info-strip { padding: 4px 12px; gap: 3px; }
      .strip-row { min-height: 20px; font-size: 12px; }

      /* larger button text in landscape (more width) */
      .btn { font-size: 8vmin; }
      .job-label { font-size: clamp(15px, 3.5vw, 20px); padding: 5px 4px 3px; }
    }

    /* Portrait: bigger text since buttons are taller */
    @media (orientation: portrait) {
      /* portrait: 格子較高，vmin ≈ vw，10vmin 約 37px on 375px screen */
      .btn { font-size: 10vmin; }
      .job-label { font-size: clamp(24px, 7vw, 38px); padding: 10px 4px 7px; }
      .grid { gap: 6px; padding: 6px 8px; }
      .job-btns { gap: 4px; padding: 0 5px 5px; }
    }

    /* ── Punch buttons ─────────────────────── */
    .btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      /* 字體：用 vmin 讓字跟格子大小掛勾，portrait 約 10vmin ≈ 大字 */
      font-size: 10vmin;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      /* 按鈕效果：右下角深色邊框模擬厚度，比 box-shadow 更乾淨 */
      border-bottom: 5px solid rgba(0,0,0,.25);
      border-right:  3px solid rgba(0,0,0,.15);
      transition: transform .07s, border .07s, filter .07s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      letter-spacing: .5px;
      /* 亮邊 */
      border-top:  1.5px solid rgba(255,255,255,.35);
      border-left: 1.5px solid rgba(255,255,255,.25);
    }
    .btn:disabled {
      opacity: .32;
      cursor: not-allowed;
      filter: grayscale(.4);
      border-bottom: 2px solid rgba(0,0,0,.15);
    }
    .btn:active:not(:disabled) {
      transform: translateY(3px);
      border-bottom: 2px solid rgba(0,0,0,.25);
      filter: brightness(.92);
    }


    .arr { color: #fff; }
    .lve { color: #fff; }

    .d-a  { background: var(--dispatch-a); }
    .d-l  { background: var(--dispatch-l); }
    .l1-a { background: var(--level1-a);   }
    .l1-l { background: var(--level1-l);   }
    .sw-a { background: var(--swap-a);     }
    .sw-l { background: var(--swap-l);     }
    .pm-a { background: var(--pump-a);     }
    .pm-l { background: var(--pump-l);     }
    .cl-a { background: var(--clean-a);    }
    .cl-l { background: var(--clean-l);    }
    .rs-a { background: #475569;           }
    .rs-l { background: #1e293b; border: 1.5px solid #475569; }

    /* ── Loading / Result overlay ──────────── */
    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
    }
    .overlay.show { display: flex; }

    .ov-icon {
      font-size: 52px;
      line-height: 1;
    }
    .ov-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      text-align: center;
    }
    .ov-msg {
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
    }
    .ov-detail {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      padding: 10px 20px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-line;   /* ★ 讓 \n 變成換行（給多行錯誤提示用） */
    }
    .ov-detail.ok  { background: #f0fdf4; color: #15803d; }
    .ov-detail.err { background: #fef2f2; color: #dc2626; }

    .ov-countdown {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .ov-retry-btn {
      font-size: 16px;
      font-weight: 800;
      padding: 13px 32px;
      border: none;
      border-radius: 14px;
      background: #1a202c;
      color: #fff;
      cursor: pointer;
      letter-spacing: .3px;
    }
    .ov-retry-btn:active { opacity: .8; transform: scale(.97); }

    /* spinner (overlay) */
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    /* spinner (strip inline) */
    .strip-spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #d1d5db;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Idle ──────────────────────────────── */
    .idle-wrap {
      display: none;
      flex: 0 0 auto;
      margin: 0 10px 6px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #fffbeb;
      border: 1px dashed #fcd34d;
    }
    .idle-wrap p { font-size: 12px; color: #92400e; line-height: 1.5; margin-bottom: 6px; }
    .idle-btn {
      font-size: 13px; font-weight: 700;
      padding: 6px 14px; border: none; border-radius: 8px;
      background: #1a202c; color: #fff; cursor: pointer;
    }

    /* ── Debug ─────────────────────────────── */
    details { flex: 0 0 auto; padding: 0 12px 8px; }
    summary { font-size: 11px; color: #94a3b8; cursor: pointer; }
    .debug-box {
      margin-top: 5px; padding: 8px; border-radius: 8px;
      background: #0f172a; color: #7dd3fc;
      font-size: 11px; font-family: ui-monospace, monospace;
      max-height: 140px; overflow: auto; white-space: pre-wrap;
    }

    /* overlay must sit over the whole page */
    body { position: relative; }
  </style>
</head>

<body>
  <div class="shell">

    <!-- Header -->
    <div class="hd">
      <span class="hd-title">桃園營運處｜打卡系統</span>
      <span class="hd-user" id="hdUser">驗證中…</span>
    </div>

    <!-- Info strip: status + last punch -->
    <div class="info-strip">

      <div class="strip-row">
        <span class="strip-dot clock" id="lastDot"></span>
        <span class="strip-label">上次打卡</span>
        <span class="strip-spin" id="lastSpin"></span><span class="strip-val muted" id="lastVal"></span>
      </div>
    </div>

    <!-- Auth gate overlay -->
    <div class="auth-gate" id="authGate">
      <div class="auth-gate-icon" id="agIcon">🔒</div>
      <div class="auth-gate-title" id="agTitle">無法使用打卡系統</div>
      <div class="auth-gate-badge pending" id="agBadge">審核中</div>
      <div class="auth-gate-msg" id="agMsg">您的帳號尚未取得打卡權限，請聯絡管理員開通。</div>
      <div class="auth-gate-contact">如有疑問請聯絡主管或系統管理員</div>
    </div>

    <!-- Main grid -->
    <div class="grid">
      <div class="job">
        <div class="job-label">調度</div>
        <div class="job-btns">
          <button class="btn arr d-a" id="btnDA">到站</button>
          <button class="btn lve d-l" id="btnDL">離站</button>
        </div>
      </div>
      <div class="job">
        <div class="job-label">一級</div>
        <div class="job-btns">
          <button class="btn arr l1-a" id="btnL1A">到站</button>
          <button class="btn lve l1-l" id="btnL1L">離站</button>
        </div>
      </div>
      <div class="job">
        <div class="job-label">換電</div>
        <div class="job-btns">
          <button class="btn arr sw-a" id="btnSA">到站</button>
          <button class="btn lve sw-l" id="btnSL">離站</button>
        </div>
      </div>
      <div class="job">
        <div class="job-label">打氣</div>
        <div class="job-btns">
          <button class="btn arr pm-a" id="btnPA">到站</button>
          <button class="btn lve pm-l" id="btnPL">離站</button>
        </div>
      </div>
      <div class="job">
        <div class="job-label">清潔</div>
        <div class="job-btns">
          <button class="btn arr cl-a" id="btnCA">到站</button>
          <button class="btn lve cl-l" id="btnCL">離站</button>
        </div>
      </div>
      <div class="job rest-job">
        <div class="job-label">休息</div>
        <div class="job-btns">
          <button class="btn arr rs-a" id="btnRA">開始</button>
          <button class="btn lve rs-l" id="btnRL">結束</button>
        </div>
      </div>
    </div>

    <div class="idle-wrap" id="idleWrap">
      <p>頁面閒置過久，LINE 定位可能失效，建議重新整理後再打卡。</p>
      <button class="idle-btn" onclick="hardReload()">重新整理</button>
    </div>

    <details id="dbgWrap" style="display:none;">
      <summary>debug（test=1）</summary>
      <div class="debug-box" id="debug"></div>
    </details>

  </div><!-- /shell -->

  <!-- ── Full-screen overlay (loading / result) ── -->
  <div class="overlay" id="overlay">
    <!-- loading state -->
    <div id="ovLoading">
      <div style="display:flex;flex-direction:column;align-items:center;gap:18px;">
        <div class="spinner"></div>
        <div class="ov-title" id="ovLoadTitle">定位中…</div>
        <div class="ov-msg" id="ovLoadMsg">請稍候</div>
      </div>
    </div>
    <!-- result state -->
    <div id="ovResult" style="display:none;flex-direction:column;align-items:center;gap:14px;">
      <div class="ov-icon" id="ovIcon">✅</div>
      <div class="ov-title" id="ovResultTitle">打卡成功</div>
      <div class="ov-detail ok" id="ovDetail"></div>
      <div class="ov-countdown" id="ovCountdown"></div>
      <button class="ov-retry-btn" id="ovRetryBtn" style="display:none;" onclick="closeOverlay()">重新打卡</button>
    </div>
  </div>

<script>
const LIFF_ID    = "2009174277-dSY24pNu";
const GAS_URL    = "https://script.google.com/macros/s/AKfycbxUFysH7fGKyM9gJ_1vRMIa3krcuAsq7K5yDEioOXjB0NVbPJMx_e3TytAa_Nt6Eok94w/exec";
const IDLE_MIN   = 8;
// ★ GPS 設定：永遠用高精度，永遠不用快取（避免「跑偏」用到舊位置）
const GEO_RETRY  = 50;     // ≤ 50m 立刻用（早退出閾值）
const GEO_ACCEPT = 100;    // > 100m 拒絕（避免站點之間誤判）
const GEO_FRESH_MS = 3000; // 3 秒內的位置算「新鮮」可直接用
const GEO_OPTS_WATCH   = { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 };
const GEO_OPTS_ONESHOT = { enableHighAccuracy: true, timeout: 6000,  maximumAge: 0 };

const $authGate  = document.getElementById("authGate");
const $agIcon    = document.getElementById("agIcon");
const $agTitle   = document.getElementById("agTitle");
const $agBadge   = document.getElementById("agBadge");
const $agMsg     = document.getElementById("agMsg");
const $idleWrap  = document.getElementById("idleWrap");
const $debug     = document.getElementById("debug");
const $dbgWrap   = document.getElementById("dbgWrap");
const $lastVal   = document.getElementById("lastVal");
const $overlay       = document.getElementById("overlay");
const $ovLoading     = document.getElementById("ovLoading");
const $ovLoadTitle   = document.getElementById("ovLoadTitle");
const $ovLoadMsg     = document.getElementById("ovLoadMsg");
const $ovResult      = document.getElementById("ovResult");
const $ovIcon        = document.getElementById("ovIcon");
const $ovResultTitle = document.getElementById("ovResultTitle");
const $ovDetail      = document.getElementById("ovDetail");
const $ovCountdown   = document.getElementById("ovCountdown");
const $ovRetryBtn    = document.getElementById("ovRetryBtn");

const ALL_IDS = ["btnDA","btnDL","btnL1A","btnL1L","btnSA","btnSL","btnPA","btnPL","btnCA","btnCL","btnRA","btnRL"];
const allBtns = ALL_IDS.map(id => document.getElementById(id));

let PROFILE = null, AUTH_READY = false;
let lastAct = Date.now(), idleShown = false;
let countdownTimer = null;

// ★ GPS 預熱：頁面一打開就持續抓 GPS，按打卡時直接用最新位置（幾乎 0 等待）
let GEO_LAST = null;          // {lat, lng, accuracy, ts}
let GEO_WATCH_ID = null;
let GEO_WAITERS = [];         // 等待新位置的 Promise 列表

function applyGeoUpdate_(p) {
  // 更新規則：只在沒舊值、或新一筆比較精準、或舊值已過 5 秒時才更新
  // 避免「比較差的舊讀數覆蓋掉比較好的新讀數」
  const now = Date.now();
  const incoming = {
    lat: p.coords.latitude,
    lng: p.coords.longitude,
    accuracy: +p.coords.accuracy,
    ts: now
  };
  if (!GEO_LAST
      || incoming.accuracy <= GEO_LAST.accuracy
      || (now - GEO_LAST.ts) > 5000) {
    GEO_LAST = incoming;
  }
  // 通知所有等待中的 punch
  const waiters = GEO_WAITERS;
  GEO_WAITERS = [];
  waiters.forEach(function(w){ w.resolve(GEO_LAST); });
}

function startGeoWatch() {
  if (!navigator.geolocation || GEO_WATCH_ID !== null) return;

  // ★ 雙保險（為 LIFF / LINE WebView 設計）：
  //   有些 LINE 內建瀏覽器（特別是舊版 Android）會讓 watchPosition 靜默失敗
  //   所以同時觸發一次性 getCurrentPosition，至少拿到一筆位置
  navigator.geolocation.getCurrentPosition(
    applyGeoUpdate_,
    function() { /* 一次性失敗不影響 watch */ },
    GEO_OPTS_ONESHOT
  );

  GEO_WATCH_ID = navigator.geolocation.watchPosition(
    applyGeoUpdate_,
    function(err) { /* 暫時失敗不中斷 watch，繼續嘗試 */ },
    GEO_OPTS_WATCH
  );
}

function stopGeoWatch() {
  if (GEO_WATCH_ID !== null) {
    try { navigator.geolocation.clearWatch(GEO_WATCH_ID); } catch(_) {}
    GEO_WATCH_ID = null;
  }
}

// 取得「新鮮」的 GPS 位置；最多等 maxWaitMs 毫秒。
// 若已有 GEO_FRESH_MS 內的位置，立刻回傳（速度關鍵）
function getFreshGeo(maxWaitMs) {
  return new Promise(function(resolve, reject){
    if (GEO_LAST && (Date.now() - GEO_LAST.ts) < GEO_FRESH_MS) {
      resolve(GEO_LAST); return;
    }
    const waiter = { resolve: resolve, rejected: false };
    GEO_WAITERS.push(waiter);
    setTimeout(function(){
      if (waiter.rejected) return;
      const idx = GEO_WAITERS.indexOf(waiter);
      if (idx >= 0) GEO_WAITERS.splice(idx, 1);
      if (GEO_LAST) resolve(GEO_LAST);
      else { waiter.rejected = true; reject(new Error("定位逾時")); }
    }, maxWaitMs);
  });
}

/* ── Status strip helpers ───────────────────── */
function setStatus(msg, type) {
  /* status row removed – no-op */
}

const $lastSpin = document.getElementById("lastSpin");
function setLastPunch(text) {
  if($lastSpin) $lastSpin.style.display = "none";
  $lastVal.className = "strip-val";
  $lastVal.textContent = text || "—";
}

/* ── Overlay helpers ───────────────────────── */
function showLoading(title, msg) {
  $ovLoading.style.display = "";
  $ovResult.style.display = "none";
  $ovLoadTitle.textContent = title || "處理中…";
  $ovLoadMsg.textContent = msg || "請稍候";
  $overlay.classList.add("show");
}

function showResult(ok, title, detail, onClose) {
  $ovLoading.style.display = "none";
  $ovResult.style.display = "flex";
  $ovIcon.textContent = ok ? "✅" : "❌";
  $ovResultTitle.textContent = title;
  $ovDetail.textContent = detail;
  $ovDetail.className = "ov-detail " + (ok ? "ok" : "err");
  $ovRetryBtn.style.display = ok ? "none" : "";
  $ovCountdown.textContent = "";
  $overlay.classList.add("show");

  if (countdownTimer) clearInterval(countdownTimer);

  if (ok) {
    // ★ 速度優先：成功後 1.5 秒自動關閉（讓人員馬上回去工作，不要卡在畫面）
    $ovCountdown.textContent = "即將關閉…";
    countdownTimer = setTimeout(() => {
      countdownTimer = null;
      closeOverlay();
      if (onClose) onClose();
    }, 1500);
  }
}

function closeOverlay() {
  if (countdownTimer) { clearTimeout(countdownTimer); countdownTimer = null; }
  $overlay.classList.remove("show");
  setBtns(false);
}

/* ── General helpers ───────────────────────── */
function setBtns(d) { allBtns.forEach(b => b.disabled = d); }
function touch() { lastAct = Date.now(); if (idleShown) { $idleWrap.style.display="none"; idleShown=false; } }
function hardReload() { try { const u=new URL(location.href); u.searchParams.set("v",Date.now()); location.replace(u.toString()); } catch(_){ location.reload(true); } }

function getMergedParams() {
  const s=new URLSearchParams(window.location.search||""), m=new URLSearchParams(s.toString());
  const raw=s.get("liff.state");
  if(raw){let d="";try{d=decodeURIComponent(raw);}catch(_){d=raw;}if(d.startsWith("?"))d=d.slice(1);new URLSearchParams(d).forEach((v,k)=>m.set(k,v));}
  return m;
}
const isTest = () => getMergedParams().get("test")==="1";
function showDbg(o){if(!isTest())return;$dbgWrap.style.display="";$debug.textContent=JSON.stringify(o,null,2);}
function jobLabel(j){return{dispatch:"調度",level1:"一級",swap:"換電",pump:"打氣",clean:"清潔",rest:"休息"}[j]||j;}
function stepLabel(s){return s==="arrive"?"到站":"離站";}

setInterval(()=>{if((Date.now()-lastAct)/60000>=IDLE_MIN&&!idleShown){idleShown=true;$idleWrap.style.display="";}},15000);

/* ── Geolocation ───────────────────────────── */
function geoOnce(opts){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation)return rej(new Error("此裝置不支援定位"));
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:+p.coords.accuracy,ts:Date.now()}),
      e=>rej(new Error(e.message||"定位失敗")),opts);
  });
}
function goodLoc(l){return l&&isFinite(l.lat)&&isFinite(l.lng)&&l.accuracy>0;}
function betterLoc(a,b){if(!goodLoc(a))return b;if(!goodLoc(b))return a;return a.accuracy<=b.accuracy?a:b;}

// ★ 新版 smartGeo：用預熱中的 watchPosition 為主、一次性 getCurrentPosition 為備援
//   - 通常按下打卡瞬間就有位置可用（0 等待）
//   - 完全不用 GPS 快取，永遠是最新位置
async function smartGeo(skipAccuracy){
  const log=[];

  // 1) 先看預熱位置：≤ GEO_RETRY 立刻用（最快路徑）
  if (GEO_LAST && (Date.now() - GEO_LAST.ts) < GEO_FRESH_MS) {
    log.push({step:"warm",loc:GEO_LAST});
    if (skipAccuracy && goodLoc(GEO_LAST)) return {loc:GEO_LAST,log};
    if (goodLoc(GEO_LAST) && GEO_LAST.accuracy <= GEO_RETRY) return {loc:GEO_LAST,log};
  }

  // 2) 等下一次 watchPosition 推送（最多 4 秒），同時觸發一次性高精度定位
  let watched = null, oneshot = null;
  try {
    const arr = await Promise.all([
      getFreshGeo(4000).catch(e=>({_err:String(e.message)})),
      geoOnce(GEO_OPTS_ONESHOT).catch(e=>({_err:String(e.message)}))
    ]);
    watched = arr[0]&&!arr[0]._err ? arr[0] : null;
    oneshot = arr[1]&&!arr[1]._err ? arr[1] : null;
    log.push({step:"watch",loc:watched,err:arr[0]&&arr[0]._err});
    log.push({step:"oneshot",loc:oneshot,err:arr[1]&&arr[1]._err});
  } catch(e) {
    log.push({step:"both_failed",err:String(e.message)});
  }

  // 3) 取最佳結果
  const best = betterLoc(betterLoc(watched, oneshot), GEO_LAST);
  if (!goodLoc(best)) { const err=new Error("定位失敗"); err.log=log; throw err; }
  return {loc:best, log};
}

/* ── Network ───────────────────────────────── */
async function postGas(payload, opts){
  // ★ 修改 C：加 timeout，避免 GAS 卡住或網路斷線時 fetch 一直等
  // ★ 修改 D：可選 retries — 給初始化這種非破壞性請求用，避免 GAS 冷啟動 / 4G 抖動誤判
  //   注意：punch() 不要傳 retries，打卡是非冪等的，重試會造成重複打卡
  const timeoutMs = (opts && opts.timeout) || 15000;
  const retries   = (opts && opts.retries) || 0;

  let lastErr;
  for (let i = 0; i <= retries; i++) {
    const ctrl  = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
    try{
      const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload),signal:ctrl.signal});
      const txt=await r.text();let data={};try{data=JSON.parse(txt);}catch(_){}return{r,txt,data};
    } catch(e){
      lastErr = (e && e.name === "AbortError") ? new Error("network_timeout") : e;
      if (i === retries) break;
      await new Promise(r => setTimeout(r, 800 * (i + 1)));   // 0.8s, 1.6s
    } finally {
      clearTimeout(timer);
    }
  }
  throw lastErr;
}

// ★ 失敗回報（fire-and-forget，絕不影響打卡時間）
//   1. 不 await，呼叫端打完繼續往下走
//   2. 自帶 3 秒 timeout，連送出都失敗就直接放棄
//   3. 全包在 try-catch，任何錯誤都吞掉（連 console 都不留）
function reportError(kind, stage, message) {
  try {
    const ctrl = new AbortController();
    setTimeout(function(){ try { ctrl.abort(); } catch(_){} }, 3000);
    fetch(GAS_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        action: "report",
        kind: String(kind||""),
        stage: String(stage||""),
        message: String(message||""),
        userId: (PROFILE && PROFILE.userId) || "",
        displayName: (PROFILE && PROFILE.displayName) || "",
        ua: (navigator && navigator.userAgent) || "",
        ts: Date.now()
      }),
      signal: ctrl.signal,
      keepalive: true
    }).catch(function(){});
  } catch(_) {}
}

/* ── Auth gate ─────────────────────────────── */
function showAuthGate(status, message) {
  const configs = {
    pending: {
      icon: "⏳",
      title: "帳號審核中",
      badge: "待審核",
      badgeClass: "pending",
      msg: "您的帳號已登記，正在等待管理員審核開通，審核完成後即可使用打卡功能。"
    },
    blocked: {
      icon: "🚫",
      title: "帳號已停權",
      badge: "無使用權限",
      badgeClass: "blocked",
      msg: "此帳號已被停用，無法使用打卡系統，請聯絡管理員了解原因。"
    },
    disabled: {
      icon: "⛔",
      title: "帳號已停用",
      badge: "停用中",
      badgeClass: "disabled",
      msg: "此帳號目前處於停用狀態，如需恢復請聯絡管理員。"
    },
    error: {
      icon: "⚠️",
      title: "驗證失敗",
      badge: "系統錯誤",
      badgeClass: "error",
      msg: message || "授權檢查時發生錯誤，請稍後再試或重新整理頁面。"
    },
    liff_failed: {
      icon: "🔄",
      title: "登入已失效",
      badge: "需要重新整理",
      badgeClass: "error",
      msg: "LINE 登入狀態已過期，請關閉此頁面後重新從 LINE 開啟。"
    },
    init_failed: {
      icon: "⚠️",
      title: "初始化失敗",
      badge: "系統錯誤",
      badgeClass: "error",
      msg: message
        ? ("系統初始化失敗：" + message + "\n請截圖後聯絡管理員，或關閉後重新開啟試試。")
        : "系統初始化失敗，請關閉後重新開啟，若問題持續請聯絡管理員。"
    }
  };
  const c = configs[status] || configs.error;
  $agIcon.textContent  = c.icon;
  $agTitle.textContent = c.title;
  $agBadge.textContent = c.badge;
  $agBadge.className   = "auth-gate-badge " + c.badgeClass;
  $agMsg.textContent   = c.msg;
  $authGate.classList.add("show");
  setBtns(true);
}

async function initAuth(){
  setBtns(true); AUTH_READY=false; setStatus("登入驗證中…","muted");
  let stage = "start";
  try{
    stage = "liff.init";
    await initLiffWithRetry(LIFF_ID, 2);
    stage = "liff.login_check";
    if(!liff.isInClient()&&!liff.isLoggedIn()){liff.login();return;}
    stage = "liff.getProfile";
    PROFILE=await liff.getProfile().catch(()=>{throw new Error("liff_profile_failed");});
    // ★ checkAuth 和 getLastPunch 同時送出，但不等 getLastPunch
    // checkAuth 完成就立即開放按鈕，getLastPunch 背景跑完再更新
    // ★ 初始化對 GAS 冷啟動友善：放寬到 25 秒 + 一次自動 retry
    stage = "postGas.getLastPunch";
    const lastPunchPromise = postGas(
      {action:"getLastPunch",userId:PROFILE.userId||"",ts:Date.now()},
      {timeout:25000, retries:1}
    ).catch(err => ({ data: null, _err: err }));   // ★ 防止 unhandled rejection
    stage = "postGas.checkAuth";
    const authRes = await postGas(
      {action:"checkAuth",userId:PROFILE.userId||"",displayName:PROFILE.displayName||"",test:isTest()?"1":"0",ts:Date.now()},
      {timeout:25000, retries:1}
    );
    stage = "parseAuth";
    const data = authRes.data;
    showDbg({step:"checkAuth",profile:PROFILE,result:data});
    if(!data||!data.ok){showAuthGate("error", data&&data.message);return;}
    if(data.canPunch){
      $authGate.classList.remove("show");
      AUTH_READY=true;
      setBtns(false);
      setStatus("可以打卡","ok");
      // 背景等 getLastPunch 完成再更新，不阻擋打卡
      lastPunchPromise.then(({data:ld})=>{
        if(ld&&ld.ok&&ld.found&&ld.text) setLastPunch(ld.text);
        else setLastPunch("—");
      }).catch(()=>{ setLastPunch("—"); });
    } else {
      const st = data.authStatus||"pending";
      showAuthGate(st, data.message);
    }
  }catch(e){
    const msg=e&&e.message||"";
    if(msg==="redirect_login")return;
    if(msg==="liff_profile_failed"){
      showAuthGate("liff_failed");
      AUTH_READY=false;
      reportError("init_failed", stage, "liff_profile_failed");
      return;
    }
    // ★ 把 stage 帶進錯誤訊息，下次用戶截圖你就知道是哪一步炸
    showAuthGate("init_failed", `[${stage}] ${msg||'未知錯誤'}`);
    AUTH_READY=false;
    // ★ 背景上報（fire-and-forget）
    reportError("init_failed", stage, msg);
  }
}

// ★ 修改 B：liff.init 重試 (網路抖動時自動重試 2 次)
async function initLiffWithRetry(liffId, retries){
  let lastErr;
  for(let i=0;i<=retries;i++){
    try{ await liff.init({liffId}); return; }
    catch(e){
      lastErr = e;
      if(i===retries) break;
      await new Promise(r=>setTimeout(r, 500*(i+1)));  // 0.5s, 1s
    }
  }
  throw lastErr;
}

/* ── Punch ─────────────────────────────────── */
async function punch(job, step){
  touch();
  if(!AUTH_READY||!PROFILE){ setStatus("尚未完成登入，請稍後再試","err"); return; }

  setBtns(true);
  const jl = jobLabel(job);
  const sl = stepLabel(step);

  const isRest = (job === "rest");
  const restText = isRest ? (step === "arrive" ? "休息開始" : "休息結束") : "";
  showLoading(isRest ? restText : `${jl}・${sl}`, isRest ? "送出中，請稍候…" : "定位中，請稍候…");

  const p = getMergedParams();

  try{
    const{loc,log}=await smartGeo(isRest);
    showDbg({step:"geo",log,best:loc});

    // ★ 休息作業不限制精度，只要能定位到座標即可
    const needAccuracy = (job !== "rest");
    if(!isFinite(loc.accuracy)||loc.accuracy<=0||(needAccuracy&&loc.accuracy>GEO_ACCEPT)){
      showResult(false,"定位異常","請到開放空間重新整理後再試");
      return;
    }

    $ovLoadMsg.textContent = "已定位，送出中…";

    const payload={job,step,userId:PROFILE.userId||"",displayName:PROFILE.displayName||"",lat:loc.lat,lng:loc.lng,accuracy:loc.accuracy,bypassKey:p.get("key")||"",test:p.get("test")||"",v:p.get("v")||"",href:location.href,ts:Date.now()};
    showDbg({step:"request",payload});
    const{data}=await postGas(payload);
    showDbg({step:"response",data});

    if(!data.ok){
      const errMsg = data.message||"打卡失敗，請稍後再試";
      showResult(false,"打卡失敗", errMsg);
      if(!errMsg.includes("離場站過遠")&&!errMsg.includes("尚未到站")&&!errMsg.includes("定位異常")){
        $idleWrap.style.display=""; idleShown=true;
      }
      return;
    }

    const station = data.stationName || "";
    const detail  = isRest
      ? (step === "arrive" ? "休息開始" : "休息結束")
      : [station, jl, sl + "打卡"].filter(Boolean).join("　");

    /* update last punch strip */
    setLastPunch(detail);

    showResult(true, "打卡成功！", detail, ()=>{
      try{ liff.closeWindow(); }catch(_){}
    });

  }catch(e){
    const msg=e&&e.message||"";
    if(msg==="redirect_login"){ closeOverlay(); return; }
    let errDisplay = "打卡失敗，請稍後再試";
    let reportKind = "punch_failed";
    if(!isTest()){
      if(msg==="liff_profile_failed"){ errDisplay="頁面放置過久，請重新整理後再打卡"; $idleWrap.style.display=""; idleShown=true; }
      else if(msg.toLowerCase().includes("timeout")){
        // 區分定位逾時 vs 網路逾時，方便後台分類診斷
        if(msg.includes("定位")) reportKind = "geo_timeout";
        else reportKind = "network_timeout";
        errDisplay =
          "定位逾時，請開啟 LINE 定位權限\n" +
          "iOS：設定→LINE→位置→使用 App 期間\n" +
          "Android：設定→應用程式→LINE→權限→位置→允許";
      }
      else if(msg.includes("定位失敗")){ errDisplay="定位異常，請再試一次"; reportKind="geo_failed"; }
      else { $idleWrap.style.display=""; idleShown=true; }
    } else {
      errDisplay=`錯誤：${msg}`;
      showDbg({step:"catch",error:String(e),stack:e.stack||""});
      $idleWrap.style.display=""; idleShown=true;
    }
    showResult(false,"打卡失敗", errDisplay);
    // ★ 背景上報（fire-and-forget），帶上 job/step 方便後台診斷
    reportError(reportKind, `${job}.${step}`, msg);
  }
}

document.getElementById("btnPL").addEventListener("click",  ()=>punch("pump","leave"));

document.getElementById("btnCL").addEventListener("click",  ()=>punch("clean","leave"));
document.getElementById("btnRA").addEventListener("click",  ()=>punch("rest","arrive"));
document.getElementById("btnRL").addEventListener("click",  ()=>punch("rest","leave"));

document.addEventListener("click",      touch, {passive:true});
document.addEventListener("touchstart", touch, {passive:true});

if(isTest())showDbg({note:"test=1",params:Object.fromEntries(getMergedParams().entries())});

// ★ 頁面一打開就立刻啟動 GPS 預熱（在 LIFF 登入驗證的同時進行）
//   等員工按下到站/離站時，通常已經有現成的精準位置可用，幾乎 0 等待
startGeoWatch();

// ★ LIFF / LINE 場景補強：員工切去 LINE 看訊息再切回來時，
//   iOS 可能把 watchPosition 凍結。所以頁面回到前景時重啟 GPS 監聽。
document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") {
    stopGeoWatch();
    startGeoWatch();
  }
});

// LIFF pageshow 也補一次（從 BFCache 復原時觸發）
window.addEventListener("pageshow", function(e) {
  if (e.persisted) {
    stopGeoWatch();
    startGeoWatch();
  }
});

initAuth();

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>桃園營運處｜打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dispatch-a: #4ade80;
      --dispatch-l: #166534;
      --level1-a:   #fbbf24;
      --level1-l:   #92400e;
      --swap-a:     #60a5fa;
      --swap-l:     #1e3a8a;
      --pump-a:     #f472b6;
      --pump-l:     #831843;
      --clean-a:    #2dd4bf;
      --clean-l:    #134e4a;
      --rest-a:     #c084fc;
      --rest-l:     #3b0764;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0f172a;
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      min-height: 100dvh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }

    .hd {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 6px;
    }

    .hd-title {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: .3px;
    }

    .hd-user {
      font-size: 12px;
      color: #94a3b8;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-bar {
      flex: 0 0 auto;
      min-height: 34px;
      margin: 0 12px 6px;
      padding: 6px 12px;
      border-radius: 10px;
      background: #1e293b;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.4;
    }
    .status-bar.ok    { color: #4ade80; background: #052e16; }
    .status-bar.err   { color: #f87171; background: #2d0a0a; }
    .status-bar.muted { color: #94a3b8; background: #1e293b; }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: currentColor; }

    .auth-box {
      display: none;
      margin: 0 12px 6px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #2d1f00;
      border: 1px solid #78350f;
      color: #fbbf24;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.5;
    }

    .grid {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 0 12px 8px;
      min-height: 0;
    }

    .job {
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      overflow: hidden;
      min-height: 0;
    }

    .job-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .4px;
      text-align: center;
      padding: 5px 4px 3px;
      color: #cbd5e1;
      background: #1e293b;
      flex-shrink: 0;
    }

    .job-btns {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 3px;
      padding: 3px;
      background: #1e293b;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 9px;
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 800;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: 0;
      transition: opacity .12s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.1;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
    .btn:active:not(:disabled) { transform: scale(0.95); opacity: .85; }

    .btn-sub { font-size: 10px; font-weight: 600; opacity: .75; }

    .arr { color: #0f172a; }
    .lve { color: #fff; }

    .d-a  { background: var(--dispatch-a); }
    .d-l  { background: var(--dispatch-l); }
    .l1-a { background: var(--level1-a);   }
    .l1-l { background: var(--level1-l);   }
    .sw-a { background: var(--swap-a);     }
    .sw-l { background: var(--swap-l);     }
    .pm-a { background: var(--pump-a);     }
    .pm-l { background: var(--pump-l);     }
    .cl-a { background: var(--clean-a);    }
    .cl-l { background: var(--clean-l);    }
    .rs-a { background: var(--rest-a);     }
    .rs-l { background: var(--rest-l);     }

    .idle-wrap {
      display: none;
      flex: 0 0 auto;
      margin: 0 12px 6px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #1e293b;
      border: 1px dashed #334155;
    }
    .idle-wrap p { font-size: 12px; color: #94a3b8; line-height: 1.5; margin-bottom: 6px; }
    .idle-btn {
      font-size: 12px; font-weight: 700;
      padding: 6px 14px;
      border: none; border-radius: 8px;
      background: #f1f5f9; color: #0f172a;
      cursor: pointer;
    }

    details { flex: 0 0 auto; padding: 0 12px 10px; }
    summary { font-size: 11px; color: #475569; cursor: pointer; }
    .debug-box {
      margin-top: 6px; padding: 8px; border-radius: 8px;
      background: #0b1120; color: #7dd3fc;
      font-size: 11px; font-family: ui-monospace, monospace;
      max-height: 160px; overflow: auto; white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="shell">

    <div class="hd">
      <span class="hd-title">桃園營運處｜打卡系統</span>
      <span class="hd-user" id="hdUser">驗證中…</span>
    </div>

    <div class="status-bar muted" id="status">
      <span class="dot"></span>
      <span id="statusText">登入驗證中…</span>
    </div>

    <div class="auth-box" id="authBox"></div>

    <div class="grid">
      <div class="job">
        <div class="job-label">調度</div>
        <div class="job-btns">
          <button class="btn arr d-a"  id="btnDA">到站<span class="btn-sub">打卡</span></button>
          <button class="btn lve d-l"  id="btnDL">離站<span class="btn-sub">打卡</span></button>
        </div>
      </div>

      <div class="job">
        <div class="job-label">一級</div>
        <div class="job-btns">
          <button class="btn arr l1-a" id="btnL1A">到站<span class="btn-sub">打卡</span></button>
          <button class="btn lve l1-l" id="btnL1L">離站<span class="btn-sub">打卡</span></button>
        </div>
      </div>

      <div class="job">
        <div class="job-label">換電</div>
        <div class="job-btns">
          <button class="btn arr sw-a" id="btnSA">到站<span class="btn-sub">打卡</span></button>
          <button class="btn lve sw-l" id="btnSL">離站<span class="btn-sub">打卡</span></button>
        </div>
      </div>

      <div class="job">
        <div class="job-label">打氣</div>
        <div class="job-btns">
          <button class="btn arr pm-a" id="btnPA">到站<span class="btn-sub">打卡</span></button>
          <button class="btn lve pm-l" id="btnPL">離站<span class="btn-sub">打卡</span></button>
        </div>
      </div>

      <div class="job">
        <div class="job-label">清潔</div>
        <div class="job-btns">
          <button class="btn arr cl-a" id="btnCA">到站<span class="btn-sub">打卡</span></button>
          <button class="btn lve cl-l" id="btnCL">離站<span class="btn-sub">打卡</span></button>
        </div>
      </div>

      <div class="job">
        <div class="job-label">休息</div>
        <div class="job-btns">
          <button class="btn arr rs-a" id="btnRA">到站<span class="btn-sub">打卡</span></button>
          <button class="btn lve rs-l" id="btnRL">離站<span class="btn-sub">打卡</span></button>
        </div>
      </div>
    </div>

    <div class="idle-wrap" id="idleWrap">
      <p>頁面閒置過久，LINE 定位可能失效，建議重新整理後再打卡。</p>
      <button class="idle-btn" onclick="hardReload()">重新整理</button>
    </div>

    <details id="dbgWrap" style="display:none;">
      <summary>debug（test=1）</summary>
      <div class="debug-box" id="debug"></div>
    </details>

  </div>

<script>
const LIFF_ID    = "2009174277-dSY24pNu";
const GAS_URL    = "https://script.google.com/macros/s/AKfycbxUFysH7fGKyM9gJ_1vRMIa3krcuAsq7K5yDEioOXjB0NVbPJMx_e3TytAa_Nt6Eok94w/exec";
const IDLE_MIN   = 8;
const GEO_RETRY  = 100;
const GEO_ACCEPT = 150;
const GEO_FAST   = { enableHighAccuracy: false, timeout: 7000,  maximumAge: 10000 };
const GEO_PREC   = { enableHighAccuracy: true,  timeout: 10000, maximumAge: 0 };

const $status     = document.getElementById("status");
const $statusText = document.getElementById("statusText");
const $hdUser     = document.getElementById("hdUser");
const $authBox    = document.getElementById("authBox");
const $idleWrap   = document.getElementById("idleWrap");
const $debug      = document.getElementById("debug");
const $dbgWrap    = document.getElementById("dbgWrap");

const ALL_IDS = ["btnDA","btnDL","btnL1A","btnL1L","btnSA","btnSL","btnPA","btnPL","btnCA","btnCL","btnRA","btnRL"];
const allBtns = ALL_IDS.map(id => document.getElementById(id));

let PROFILE = null, AUTH_READY = false, lastAct = Date.now(), idleShown = false;

function setStatus(msg, type) {
  $status.className = "status-bar " + (type || "muted");
  $statusText.textContent = msg || "";
}
function setBtns(d) { allBtns.forEach(b => b.disabled = d); }
function touch() { lastAct = Date.now(); if (idleShown) { $idleWrap.style.display="none"; idleShown=false; } }
function hardReload() { try { const u=new URL(location.href); u.searchParams.set("v",Date.now()); location.replace(u.toString()); } catch(_){ location.reload(true); } }

function getMergedParams() {
  const s=new URLSearchParams(window.location.search||""), m=new URLSearchParams(s.toString());
  const raw=s.get("liff.state");
  if(raw){let d="";try{d=decodeURIComponent(raw);}catch(_){d=raw;}if(d.startsWith("?"))d=d.slice(1);new URLSearchParams(d).forEach((v,k)=>m.set(k,v));}
  return m;
}
const isTest = () => getMergedParams().get("test")==="1";
function showDbg(o){if(!isTest())return;$dbgWrap.style.display="";$debug.textContent=JSON.stringify(o,null,2);}
function jobLabel(j){return{dispatch:"調度",level1:"一級",swap:"換電",pump:"打氣",clean:"清潔",rest:"休息"}[j]||j;}

setInterval(()=>{if((Date.now()-lastAct)/60000>=IDLE_MIN&&!idleShown){idleShown=true;$idleWrap.style.display="";}},15000);

function geoOnce(opts){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation)return rej(new Error("此裝置不支援定位"));
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:+p.coords.accuracy,ts:Date.now()}),
      e=>rej(new Error(e.message||"定位失敗")),opts);
  });
}
function goodLoc(l){return l&&isFinite(l.lat)&&isFinite(l.lng)&&l.accuracy>0;}
function betterLoc(a,b){if(!goodLoc(a))return b;if(!goodLoc(b))return a;return a.accuracy<=b.accuracy?a:b;}
async function smartGeo(){
  const log=[];let first=null;
  try{first=await geoOnce(GEO_FAST);log.push({step:"fast",ok:true,loc:first});}
  catch(e){log.push({step:"fast",ok:false,err:String(e.message)});}
  if(goodLoc(first)&&first.accuracy<=GEO_RETRY)return{loc:first,log};
  let second=null;
  try{second=await geoOnce(GEO_PREC);log.push({step:"precise",ok:true,loc:second});}
  catch(e){log.push({step:"precise",ok:false,err:String(e.message)});}
  const best=betterLoc(first,second);
  if(!goodLoc(best)){const e=new Error("定位失敗");e.log=log;throw e;}
  return{loc:best,log};
}

async function postGas(payload){
  const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  const txt=await r.text();let data={};try{data=JSON.parse(txt);}catch(_){}return{r,txt,data};
}

async function initAuth(){
  setBtns(true); AUTH_READY=false; setStatus("登入驗證中…","muted");
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isInClient()&&!liff.isLoggedIn()){liff.login();return;}
    PROFILE=await liff.getProfile().catch(()=>{throw new Error("liff_profile_failed");});
    $hdUser.textContent=PROFILE.displayName||"使用者";
    const{data}=await postGas({action:"checkAuth",userId:PROFILE.userId||"",displayName:PROFILE.displayName||"",test:isTest()?"1":"0",ts:Date.now()});
    showDbg({step:"checkAuth",profile:PROFILE,result:data});
    if(!data||!data.ok){$authBox.style.display="";$authBox.textContent="授權檢查失敗，請稍後再試";setStatus("授權檢查失敗","err");return;}
    if(data.canPunch){$authBox.style.display="none";AUTH_READY=true;setBtns(false);setStatus("已登入，可開始打卡","muted");}
    else{$authBox.style.display="";$authBox.textContent=data.message||"尚未開通打卡權限，請聯絡管理員";setStatus("目前無法打卡","err");}
  }catch(e){
    const msg=e&&e.message||"";
    if(msg==="redirect_login")return;
    $authBox.style.display="";
    $authBox.textContent=msg==="liff_profile_failed"?"登入狀態已失效，請重新整理後再試":"登入初始化失敗，請重新整理後再試";
    setStatus("登入初始化失敗","err"); AUTH_READY=false;
  }
}

async function punch(job,step){
  touch();
  if(!AUTH_READY||!PROFILE){setStatus("尚未完成登入，請稍後再試","err");return;}
  setBtns(true);
  setStatus(`定位中… ${jobLabel(job)} ${step==="arrive"?"到站":"離站"}`,"muted");
  const p=getMergedParams();
  try{
    const{loc,log}=await smartGeo();
    showDbg({step:"geo",log,best:loc});
    if(!isFinite(loc.accuracy)||loc.accuracy<=0||loc.accuracy>GEO_ACCEPT){setStatus("定位異常，請再試一次","err");setBtns(false);return;}
    setStatus("送出打卡中…","muted");
    const payload={job,step,userId:PROFILE.userId||"",displayName:PROFILE.displayName||"",lat:loc.lat,lng:loc.lng,accuracy:loc.accuracy,bypassKey:p.get("key")||"",test:p.get("test")||"",v:p.get("v")||"",href:location.href,ts:Date.now()};
    showDbg({step:"request",payload});
    const{data}=await postGas(payload);
    showDbg({step:"response",data});
    if(!data.ok){
      const msg=data.message||"打卡失敗，請稍後再試";
      if(!msg.includes("離場站過遠")&&!msg.includes("尚未到站")&&!msg.includes("定位異常")){$idleWrap.style.display="";idleShown=true;}
      setStatus(msg,"err"); setBtns(false); return;
    }
    const station=data.stationName?`・${data.stationName}`:"";
    setStatus(`完成 ${jobLabel(job)} ${step==="arrive"?"到站":"離站"}${station}`,"ok");
    setTimeout(()=>{try{liff.closeWindow();}catch(_){}},900);
  }catch(e){
    const msg=e&&e.message||"";
    if(msg==="redirect_login"){setBtns(false);return;}
    if(!isTest()){
      if(msg==="liff_profile_failed"){setStatus("頁面放置過久，請重新整理後再打卡","err");$idleWrap.style.display="";idleShown=true;}
      else if(msg.toLowerCase().includes("timeout")){setStatus("定位逾時，請開啟定位後再試","err");}
      else if(msg.includes("定位失敗")){setStatus("定位異常，請再試一次","err");}
      else{setStatus("打卡失敗，請稍後再試","err");$idleWrap.style.display="";idleShown=true;}
    }else{
      setStatus(`錯誤：${msg}`,"err");
      showDbg({step:"catch",error:String(e),stack:e.stack||""});
      $idleWrap.style.display="";idleShown=true;
    }
    setBtns(false);
  }
}

document.getElementById("btnDA").addEventListener("click",  ()=>punch("dispatch","arrive"));
document.getElementById("btnDL").addEventListener("click",  ()=>punch("dispatch","leave"));
document.getElementById("btnL1A").addEventListener("click", ()=>punch("level1","arrive"));
document.getElementById("btnL1L").addEventListener("click", ()=>punch("level1","leave"));
document.getElementById("btnSA").addEventListener("click",  ()=>punch("swap","arrive"));
document.getElementById("btnSL").addEventListener("click",  ()=>punch("swap","leave"));
document.getElementById("btnPA").addEventListener("click",  ()=>punch("pump","arrive"));
document.getElementById("btnPL").addEventListener("click",  ()=>punch("pump","leave"));
document.getElementById("btnCA").addEventListener("click",  ()=>punch("clean","arrive"));
document.getElementById("btnCL").addEventListener("click",  ()=>punch("clean","leave"));
document.getElementById("btnRA").addEventListener("click",  ()=>punch("rest","arrive"));
document.getElementById("btnRL").addEventListener("click",  ()=>punch("rest","leave"));

document.addEventListener("click",      touch, {passive:true});
document.addEventListener("touchstart", touch, {passive:true});

if(isTest())showDbg({note:"test=1",params:Object.fromEntries(getMergedParams().entries())});
initAuth();
</script>
</body>
</html>

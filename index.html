<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>桃園營運處｜打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --shadow:0 10px 25px rgba(0,0,0,.06);
      --radius:18px;

      --fs-title: 24px;
      --fs-sub: 16px;
      --fs-group: clamp(26px, 6vw, 32px);
      --fs-btn: clamp(20px, 4.8vw, 28px);
      --fs-status: 16px;
      --fs-debug: 13px;

      --dispatch-light:#5fd49a;
      --dispatch-dark:#15905a;

      --level1-light:#ffbe5c;
      --level1-dark:#e07a00;

      --swap-light:#7fb2ff;
      --swap-dark:#1e79ff;
    }

    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, "Noto Sans TC", sans-serif;
      background:var(--bg);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      font-size: 18px;
    }

    .page{
      min-height: 100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      box-sizing:border-box;
    }

    .card{
      width:min(560px, 100%);
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      box-sizing:border-box;
    }

    .title{
      font-size:var(--fs-title);
      font-weight:900;
      margin:0 0 10px;
      text-align:left;
      letter-spacing:.2px;
    }

    .sub{
      font-size:var(--fs-sub);
      color:#666;
      margin:0 0 16px;
      line-height:1.65;
    }

    .group{
      margin-bottom: 18px;
      border: 2px solid #e9edf5;
      border-radius: 18px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 6px 16px rgba(0,0,0,.04);
    }
    .group:last-child{ margin-bottom: 0; }

    .groupTitle{
      font-size: var(--fs-group);
      font-weight: 900;
      color:#111;
      margin: 0 0 12px;
      line-height: 1.1;
    }

    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button{
      border:0;
      border-radius:16px;
      padding: 16px 10px;
      min-height: 92px;
      font-size:var(--fs-btn);
      font-weight:900;
      cursor:pointer;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      white-space:nowrap;
      line-height:1.15;
      letter-spacing:.5px;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .dispatchArrive{ background: var(--dispatch-light); color:#000; }
    .level1Arrive{ background: var(--level1-light); color:#000; }
    .swapArrive{ background: var(--swap-light); color:#000; }

    .dispatchLeave{ background: var(--dispatch-dark); color:#fff; }
    .level1Leave{ background: var(--level1-dark); color:#fff; }
    .swapLeave{ background: var(--swap-dark); color:#fff; }

    .status{
      margin-top:16px;
      font-size:var(--fs-status);
      line-height:1.7;
      white-space:pre-wrap;
      min-height: 22px;
    }
    .ok{ color:#0a7a35; font-weight:900; }
    .err{ color:#b42318; font-weight:900; }
    .muted{ color:#666; }

    .idleWrap{
      display:none;
      margin-top:12px;
      border:2px dashed #e5e7eb;
      border-radius:16px;
      padding:12px;
      background:#fff;
    }
    .idleTitle{
      font-weight:900;
      margin:0 0 6px;
      color:#111;
    }
    .idleText{
      margin:0 0 10px;
      color:#666;
      font-size:14px;
      line-height:1.5;
    }
    .idleBtn{
      font-size:16px;
      font-weight:900;
      padding:12px 14px;
      border-radius:14px;
      border:0;
      width:auto;
      min-height:auto;
      color:#fff;
      background:#111;
      cursor:pointer;
      white-space:nowrap;
    }

    details{ margin-top:14px; }
    summary{ cursor:pointer; color:#666; font-size:14px; }
    .debugBox{
      margin-top:10px;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:12px;
      background:#fafafa;
      font-size:var(--fs-debug);
      max-height: 240px;
      overflow:auto;
      white-space:pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    @media (max-width: 380px){
      .card{ padding:14px; }
      .group{ padding:14px; }
      .row2{ gap:10px; }
      button{
        min-height:84px;
        padding:14px 8px;
        font-size: clamp(18px, 4.3vw, 22px);
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <p class="title">桃園營運處｜打卡系統</p>
      <p class="sub">
        選擇作業類，點選「到站打卡」或「離站打卡」<br>
        成功後會顯示「完成」並自動關閉。
      </p>

      <div class="group">
        <div class="groupTitle">調度</div>
        <div class="row2">
          <button id="btnDispatchArrive" class="dispatchArrive">到站打卡</button>
          <button id="btnDispatchLeave" class="dispatchLeave">離站打卡</button>
        </div>
      </div>

      <div class="group">
        <div class="groupTitle">一級</div>
        <div class="row2">
          <button id="btnLevel1Arrive" class="level1Arrive">到站打卡</button>
          <button id="btnLevel1Leave" class="level1Leave">離站打卡</button>
        </div>
      </div>

      <div class="group">
        <div class="groupTitle">換電</div>
        <div class="row2">
          <button id="btnSwapArrive" class="swapArrive">到站打卡</button>
          <button id="btnSwapLeave" class="swapLeave">離站打卡</button>
        </div>
      </div>

      <div id="idleWrap" class="idleWrap">
        <p class="idleTitle">頁面已久未操作</p>
        <p class="idleText">若你把打卡頁面放太久，LINE/定位可能會失效，容易出現「打卡失敗」。建議按下重新整理再打卡。</p>
        <button class="idleBtn" onclick="hardReload()">重新整理</button>
      </div>

      <div id="status" class="status muted"></div>
      <div id="authBox" style="display:none; margin-top:12px; padding:12px; border-radius:12px; background:#fff7e6; border:1px solid #f5d08a; color:#8a5300; font-weight:700; line-height:1.5;"></div>

      <details id="dbgWrap" style="display:none;">
        <summary>debug（僅 test=1 顯示）</summary>
        <div id="debug" class="debugBox"></div>
      </details>
    </div>
  </div>

<script>
const LIFF_ID = "2009174277-dSY24pNu";
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxUFysH7fGKyM9gJ_1vRMIa3krcuAsq7K5yDEioOXjB0NVbPJMx_e3TytAa_Nt6Eok94w/exec";

const IDLE_WARN_MIN = 8;

const GEO_OPTIONS_FAST = {
  enableHighAccuracy: false,
  timeout: 7000,
  maximumAge: 10000
};

const GEO_OPTIONS_RETRY = {
  enableHighAccuracy: true,
  timeout: 10000,
  maximumAge: 0
};

// ★ 修改：降低觸發第二次高精度定位的門檻（80→50），縮小最大接受誤差（120→100）
const GEO_RETRY_IF_OVER_M = 100;
const GEO_ACCEPT_MAX_M = 150;

const $status = document.getElementById("status");
const $debug = document.getElementById("debug");
const $dbgWrap = document.getElementById("dbgWrap");
const $idleWrap = document.getElementById("idleWrap");
const $authBox = document.getElementById("authBox");

const btns = {
  dispatchArrive: document.getElementById("btnDispatchArrive"),
  dispatchLeave:  document.getElementById("btnDispatchLeave"),
  level1Arrive:   document.getElementById("btnLevel1Arrive"),
  level1Leave:    document.getElementById("btnLevel1Leave"),
  swapArrive:     document.getElementById("btnSwapArrive"),
  swapLeave:      document.getElementById("btnSwapLeave"),
};

let CURRENT_PROFILE = null;
let AUTH_READY = false;

function setStatus(msg, type){
  $status.className = "status " + (type === "ok" ? "ok" : type === "err" ? "err" : "muted");
  $status.textContent = msg || "";
}

function setButtonsDisabled(disabled){
  Object.values(btns).forEach(b => b.disabled = disabled);
}

function getMergedParams(){
  const normal = new URLSearchParams(window.location.search || "");
  const merged = new URLSearchParams(normal.toString());

  const stateRaw = normal.get("liff.state");
  if (stateRaw) {
    let decoded = "";
    try { decoded = decodeURIComponent(stateRaw); } catch(e){ decoded = stateRaw; }
    if (decoded.startsWith("?")) decoded = decoded.slice(1);
    const sp = new URLSearchParams(decoded);
    for (const [k,v] of sp.entries()) merged.set(k,v);
  }
  return merged;
}

function isTestMode(){
  const p = getMergedParams();
  return p.get("test") === "1";
}

function showDebug(obj){
  if (!isTestMode()) return;
  $dbgWrap.style.display = "";
  $debug.textContent = JSON.stringify(obj, null, 2);
}

function jobCN(job){
  return job === "dispatch" ? "調度"
       : job === "level1" ? "一級"
       : job === "swap" ? "換電"
       : job;
}
function stepCN(step){
  return step === "arrive" ? "到站" : "離站";
}

let lastActionAt = Date.now();
let idleShown = false;

function touchAction(){
  lastActionAt = Date.now();
  if (idleShown) {
    $idleWrap.style.display = "none";
    idleShown = false;
  }
}

function hardReload(){
  try {
    const url = new URL(location.href);
    url.searchParams.set("v", String(Date.now()));
    location.replace(url.toString());
  } catch(_) {
    location.reload(true);
  }
}

setInterval(() => {
  const idleMin = (Date.now() - lastActionAt) / 60000;
  if (idleMin >= IDLE_WARN_MIN && !idleShown) {
    idleShown = true;
    $idleWrap.style.display = "";
  }
}, 15000);

function getLocationOnce(options){
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("此裝置不支援定位"));
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: Number(pos.coords.accuracy),
        ts: Date.now()
      }),
      (err) => reject(new Error(err.message || "定位失敗")),
      options
    );
  });
}

function isGoodLocation(loc){
  return loc && isFinite(loc.lat) && isFinite(loc.lng) && isFinite(loc.accuracy) && loc.accuracy > 0;
}

function pickBetterLocation(a, b){
  if (!isGoodLocation(a)) return b;
  if (!isGoodLocation(b)) return a;
  return a.accuracy <= b.accuracy ? a : b;
}

async function getLocationSmart(){
  const attempts = [];

  let first = null;
  try {
    first = await getLocationOnce(GEO_OPTIONS_FAST);
    attempts.push({ step: "first", ok: true, loc: first });
  } catch (e) {
    attempts.push({ step: "first", ok: false, error: String(e && e.message ? e.message : e) });
  }

  // ★ 誤差 <= 50m 才直接用，否則補一次高精度定位
  if (isGoodLocation(first) && first.accuracy <= GEO_RETRY_IF_OVER_M) {
    return { loc: first, attempts };
  }

  let second = null;
  try {
    second = await getLocationOnce(GEO_OPTIONS_RETRY);
    attempts.push({ step: "second", ok: true, loc: second });
  } catch (e) {
    attempts.push({ step: "second", ok: false, error: String(e && e.message ? e.message : e) });
  }

  const best = pickBetterLocation(first, second);

  if (!isGoodLocation(best)) {
    const err = new Error("定位失敗");
    err.attempts = attempts;
    throw err;
  }

  return { loc: best, attempts };
}

async function getProfileSafe(){
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isInClient() && !liff.isLoggedIn()) {
    liff.login();
    throw new Error("redirect_login");
  }

  try {
    return await liff.getProfile();
  } catch (e) {
    throw new Error("liff_profile_failed");
  }
}

async function postJsonToGas(payload){
  const res = await fetch(GAS_WEB_APP_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
  const text = await res.text();
  let data = {};
  try { data = JSON.parse(text); } catch(_) {}
  return { res, text, data };
}

async function initAuthGate(){
  setButtonsDisabled(true);
  AUTH_READY = false;
  setStatus("登入驗證中…", "muted");

  try {
    const profile = await getProfileSafe();
    CURRENT_PROFILE = profile;

    const { data } = await postJsonToGas({
      action: "checkAuth",
      userId: profile.userId || "",
      displayName: profile.displayName || "",
      test: isTestMode() ? "1" : "0",
      ts: Date.now()
    });

    showDebug({ step:"checkAuth", profile, result:data });

    if (!data || !data.ok) {
      $authBox.style.display = "";
      $authBox.textContent = "授權檢查失敗，請稍後再試";
      setStatus("錯誤：授權檢查失敗", "err");
      return;
    }

    if (data.canPunch === true) {
      $authBox.style.display = "none";
      AUTH_READY = true;
      setButtonsDisabled(false);
      setStatus(`已登入：${profile.displayName || "使用者"}，可開始打卡`, "muted");
      return;
    }

    AUTH_READY = false;
    setButtonsDisabled(true);
    $authBox.style.display = "";
    $authBox.textContent = data.message || "尚未開通打卡權限，請聯絡管理員";
    setStatus("目前無法打卡", "err");
  } catch (e) {
    const msg = (e && e.message) ? e.message : String(e);

    if (msg === "redirect_login") return;

    $authBox.style.display = "";
    if (msg === "liff_profile_failed") {
      $authBox.textContent = "登入狀態已失效，請重新整理後再試";
    } else {
      $authBox.textContent = "登入或授權初始化失敗，請重新整理後再試";
    }
    setStatus("錯誤：登入初始化失敗", "err");
    setButtonsDisabled(true);
    AUTH_READY = false;
  }
}

async function punch(job, step){
  touchAction();

  if (!AUTH_READY || !CURRENT_PROFILE) {
    setStatus("尚未完成登入驗證，請稍後再試", "err");
    return;
  }

  setButtonsDisabled(true);
  setStatus(`定位中…（${jobCN(job)}｜${stepCN(step)}）`, "muted");

  const params = getMergedParams();
  const bypassKey = params.get("key") || "";
  const v = params.get("v") || "";
  const test = params.get("test") || "";

  try{
    const profile = CURRENT_PROFILE;
    const geoResult = await getLocationSmart();
    const loc = geoResult.loc;

    showDebug({
      step: "geo",
      attempts: geoResult.attempts,
      best: loc
    });

    if (!isFinite(loc.accuracy) || loc.accuracy <= 0 || loc.accuracy > GEO_ACCEPT_MAX_M) {
      setStatus("錯誤：定位異常，請再試一次", "err");
      setButtonsDisabled(false);
      return;
    }

    setStatus("送出打卡…", "muted");

    const payload = {
      job,
      step,
      userId: profile.userId || "",
      displayName: profile.displayName || "",
      lat: loc.lat,
      lng: loc.lng,
      accuracy: loc.accuracy,
      bypassKey,
      test,
      v,
      href: location.href,
      ts: Date.now()
    };

    showDebug({ step:"request", payload });

    const { res, text, data } = await postJsonToGas(payload);

    showDebug({ step:"response", status: res.status, text, data });

    if (!data.ok) {
      const msg = data.message || "打卡失敗，請稍後再試";

      if (msg.includes("離場站過遠")) {
        setStatus(`錯誤：${msg}`, "err");
      } else if (msg.includes("尚未到站")) {
        setStatus(`錯誤：${msg}`, "err");
      } else if (msg.includes("定位異常")) {
        setStatus("錯誤：定位異常，請再試一次", "err");
      } else {
        setStatus(`錯誤：${msg}\n（若頁面放太久，建議按下重新整理再試）`, "err");
        $idleWrap.style.display = "";
        idleShown = true;
      }

      setButtonsDisabled(false);
      return;
    }

    const station = data.stationName ? `\n站點：${data.stationName}` : "";
    setStatus(`完成 ✅\n${jobCN(job)}｜${stepCN(step)}打卡${station}`, "ok");

    setTimeout(() => {
      try { liff.closeWindow(); } catch(_) {}
    }, 900);

  } catch(e){
    const msg = (e && e.message) ? e.message : String(e);

    if (msg === "redirect_login") {
      setButtonsDisabled(false);
      return;
    }

    if (!isTestMode()) {
      if (msg === "liff_profile_failed") {
        setStatus("錯誤：頁面已放置過久，請重新整理後再打卡", "err");
        $idleWrap.style.display = "";
        idleShown = true;
      } else if (msg.toLowerCase().includes("timeout")) {
        setStatus("錯誤：定位逾時，請開啟定位或重新整理後再試", "err");
      } else if (msg.includes("定位失敗")) {
        setStatus("錯誤：定位異常，請再試一次", "err");
      } else {
        setStatus("錯誤：打卡失敗，請稍後再試\n（若頁面放太久，建議重新整理）", "err");
        $idleWrap.style.display = "";
        idleShown = true;
      }
    } else {
      setStatus(`錯誤：${msg}`, "err");
      showDebug({ step:"catch", error: String(e), stack: e && e.stack ? e.stack : "" });
      $idleWrap.style.display = "";
      idleShown = true;
    }

    setButtonsDisabled(false);
  }
}

btns.dispatchArrive.addEventListener("click", () => punch("dispatch","arrive"));
btns.dispatchLeave.addEventListener("click", () => punch("dispatch","leave"));
btns.level1Arrive.addEventListener("click", () => punch("level1","arrive"));
btns.level1Leave.addEventListener("click", () => punch("level1","leave"));
btns.swapArrive.addEventListener("click", () => punch("swap","arrive"));
btns.swapLeave.addEventListener("click", () => punch("swap","leave"));

(function(){
  document.addEventListener("click", touchAction, { passive:true });
  document.addEventListener("touchstart", touchAction, { passive:true });
  document.addEventListener("keydown", touchAction, { passive:true });

  if (isTestMode()) {
    const p = getMergedParams();
    showDebug({ note:"test=1", mergedParams:Object.fromEntries(p.entries()) });
  } else {
    setStatus("", "muted");
  }

  initAuthGate();
})();
</script>
</body>
</html>
